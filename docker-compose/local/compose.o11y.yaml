services:
  backend:
    environment:
      - DJANGO_OTEL_METRICS_ENABLED=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://o11y-metrics:8428/opentelemetry
      - OTEL_METRIC_EXPORT_INTERVAL=15000
      - OTEL_SERVICE_NAME=nest-backend

  frontend:
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://o11y-metrics:8428/opentelemetry
      - OTEL_METRIC_EXPORT_INTERVAL=15000
      - OTEL_SERVICE_NAME=nest-frontend

  o11y-metrics:
    container_name: nest-o11y-metrics
    command:
      - -retentionPeriod=7d
      - -storageDataPath=/data
    image: victoriametrics/victoria-metrics:v1.145.0@sha256:c014fb5a711d38cb24fd0673197592cd1394bb903dbb16aea565620c9c8a3d70
    healthcheck:
      interval: 5s
      retries: 5
      test: [CMD, wget, --spider, -q, http://127.0.0.1:8428/health]
      timeout: 5s
    networks:
      - nest-network
    ports:
      - 8428:8428
    volumes:
      - o11y-metrics-data:/data

  o11y-grafana:
    container_name: nest-o11y-grafana
    depends_on:
      o11y-metrics:
        condition: service_healthy
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_DEFAULT_THEME=light
      - O11Y_METRICS_URL=http://o11y-metrics:8428
    image: grafana/grafana-oss:13.0.2@sha256:5dad0df181cb644a14e13617b913b261a54f7d4fd4510721dba420929f35bea2
    healthcheck:
      interval: 5s
      retries: 5
      test: [CMD, wget, --spider, -q, http://127.0.0.1:3000/api/health]
      timeout: 5s
    networks:
      - nest-network
    ports:
      - 127.0.0.1:3001:3000
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - o11y-grafana-data:/var/lib/grafana

volumes:
  o11y-grafana-data:
  o11y-metrics-data:
