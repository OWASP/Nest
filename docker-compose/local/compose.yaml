services:
  backend:
    container_name: nest-backend
    command: >
      sh -c '
        python manage.py migrate &&
        python manage.py clear_cache &&
        python manage.py runserver 0.0.0.0:8000
      '
    image: nest-local-backend
    build:
      context: ../../backend
      dockerfile: ../docker/backend/Dockerfile.local
    depends_on:
      cache:
        condition: service_healthy
      db:
        condition: service_healthy
    env_file: ../../backend/.env
    networks:
      - nest-network
    ports:
      - 8000:8000
    volumes:
      - ../../backend:/home/owasp
      - backend-venv-community-snapshots:/home/owasp/.venv

  cache:
    command: >
      sh -c '
        redis-server --requirepass $$DJANGO_REDIS_PASSWORD --maxmemory 25mb --maxmemory-policy allkeys-lru
      '
    container_name: nest-cache
    env_file: ../../backend/.env
    image: redis:8.8.0-alpine3.23@sha256:09160599abd229764c0fb44cb6be640294e1d360a54b19985ab4843dcf2d90f1
    healthcheck:
      interval: 5s
      retries: 5
      test: [CMD, redis-cli, -a, $$DJANGO_REDIS_PASSWORD, ping]
      timeout: 5s
    networks:
      - nest-network
    volumes:
      - cache-data-community-snapshots:/data

  db:
    container_name: nest-db
    env_file: ../../backend/.env
    image: pgvector/pgvector:pg16@sha256:131dcf7ff6a900545df8e7e092c270aa8c6db2f2c818e408cb45ec21316b74e6
    healthcheck:
      interval: 5s
      retries: 5
      test: [CMD-SHELL, pg_isready -U "$$DJANGO_DB_USER" -d "$$DJANGO_DB_NAME"]
      timeout: 5s
    networks:
      - nest-network
    volumes:
      - db-data-community-snapshots:/var/lib/postgresql/data

  docs:
    container_name: nest-docs
    command: >
      sh -c '
        mkdocs serve -a 0.0.0.0:8001 -f .mkdocs.yaml
      '
    build:
      context: ../../
      dockerfile: docker/docs/Dockerfile.local
    networks:
      - nest-network
    ports:
      - 8001:8001
    volumes:
      - ../../docs:/home/owasp/docs
      - ../../backend:/home/owasp/backend:ro
      - ../../frontend:/home/owasp/frontend:ro
      - ../../README.md:/home/owasp/README.md:ro
      - ../../CODE_OF_CONDUCT.md:/home/owasp/CODE_OF_CONDUCT.md:ro
      - ../../CONTRIBUTING.md:/home/owasp/CONTRIBUTING.md:ro
      - docs-venv-community-snapshots:/home/owasp/.venv

  frontend:
    container_name: nest-frontend
    command: >
      sh -c '
        pnpm run dev
      '
    build:
      context: ../../frontend
      dockerfile: ../docker/frontend/Dockerfile.local
    depends_on:
      - backend
    environment:
      - NEXT_TELEMETRY_DISABLED=1
      - NODE_ENV=development
    networks:
      - nest-network
    ports:
      - 3000:3000
    volumes:
      - ../../frontend:/home/owasp
      - frontend-next-community-snapshots:/home/owasp/.next
      - frontend-node-modules-community-snapshots:/home/owasp/node_modules

  worker:
    container_name: nest-worker
    command: >
      sh -c '
        python manage.py rqworker ai --with-scheduler
      '
    image: nest-local-backend
    depends_on:
      backend:
        condition: service_started
      cache:
        condition: service_healthy
      db:
        condition: service_healthy
    env_file: ../../backend/.env
    networks:
      - nest-network
    volumes:
      - ../../backend:/home/owasp
      - backend-venv-community-snapshots:/home/owasp/.venv

networks:
  nest-network:

volumes:
  backend-venv-community-snapshots:
  cache-data-community-snapshots:
  db-data-community-snapshots:
  docs-venv-community-snapshots:
  frontend-next-community-snapshots:
  frontend-node-modules-community-snapshots:
