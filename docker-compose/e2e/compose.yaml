services:
  backend:
    build:
      context: ../../backend
      dockerfile: ../docker/backend/Dockerfile
      target: backend
    command: >
      sh -c '
        python manage.py migrate &&
        gunicorn wsgi:application --bind 0.0.0.0:9000
      '
    container_name: e2e-nest-backend
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    env_file: ../../backend/.env.e2e-tests
    healthcheck:
      interval: 10s
      retries: 10
      test: >
        sh -c '
          wget --spider http://backend:9000/status/
        '
      timeout: 10s
      start_period: 5s
    networks:
      - e2e-nest-network
    ports:
      - 9000:9000
    volumes:
      - ../../backend/data:/home/owasp/data

  data-loader:
    container_name: e2e-nest-data-loader
    image: pgvector/pgvector:pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DJANGO_DB_PASSWORD:-nest_user_e2e_password}
      POSTGRES_USER: ${DJANGO_DB_USER:-nest_user_e2e}
      POSTGRES_DB: ${DJANGO_DB_NAME:-nest_db_e2e}
    volumes:
      - ../../backend/data:/data:ro
    networks:
      - e2e-nest-network
    command: >
      sh -c '
        echo "Loading data from dump..." &&
        pg_restore -h db -U $$POSTGRES_USER -d $$POSTGRES_DB /data/nest.dump &&
        echo "Data loading completed."
      '
  db:
    container_name: e2e-nest-db
    image: pgvector/pgvector:pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
    environment:
      POSTGRES_DB: ${DJANGO_DB_NAME:-nest_db_e2e}
      POSTGRES_PASSWORD: ${DJANGO_DB_PASSWORD:-nest_user_e2e_password}
      POSTGRES_USER: ${DJANGO_DB_USER:-nest_user_e2e}
    healthcheck:
      interval: 5s
      retries: 5
      test: [CMD-SHELL, pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost -p 5432]
      timeout: 5s
    networks:
      - e2e-nest-network
    volumes:
      - e2e-db-data:/var/lib/postgresql/data
    ports:
      - 5433:5432

  cache:
    command: >
      sh -c '
        redis-server --requirepass $$REDIS_PASSWORD --maxmemory 100mb --maxmemory-policy allkeys-lru
      '
    container_name: e2e-nest-cache
    image: redis:8.8.0-alpine3.23@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    environment:
      REDIS_PASSWORD: ${DJANGO_REDIS_PASSWORD:-nest-cache-e2e-password}
    healthcheck:
      interval: 5s
      retries: 5
      test: [CMD, redis-cli, -a, $$REDIS_PASSWORD, ping]
      timeout: 5s
    networks:
      - e2e-nest-network
    volumes:
      - e2e-cache-data:/data

  frontend:
    build:
      context: ../../frontend
      dockerfile: ../docker/frontend/Dockerfile
      args:
        ENV_FILE: .env.e2e
        NEXT_PUBLIC_E2E_BACKEND_BASE_URL: http://backend:9000
        NEXT_SERVER_CSRF_URL: http://backend:9000/csrf/
        NEXT_SERVER_GRAPHQL_URL: http://backend:9000/graphql/
    container_name: e2e-nest-frontend
    depends_on:
      backend:
        condition: service_healthy
    env_file: ../../frontend/.env.e2e
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 20s
      test: >
        sh -c '
          wget --spider http://0.0.0.0:3000/api/health
        '
      timeout: 5s
    networks:
      - e2e-nest-network
    ports:
      - 3500:3000

  e2e-tests:
    build:
      context: ../..
      dockerfile: docker/e2e/Dockerfile
    container_name: e2e-nest-tests
    command: ${E2E_TEST_COMMAND:-sh -c "pnpm run test:e2e"}
    depends_on:
      frontend:
        condition: service_healthy
    environment:
      - FRONTEND_URL=http://frontend:3000
    networks:
      - e2e-nest-network
    ports:
      - 3800:3800

networks:
  e2e-nest-network:

volumes:
  e2e-cache-data:
  e2e-db-data:
