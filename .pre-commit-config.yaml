repos:
  - repo: https://github.com/AleksaC/hadolint-py
    rev: 458cb25edf664682e3e856a53a2f9af33e068297  # v2.14.0
    hooks:
      - id: hadolint
        args:
          - --failure-threshold=warning
        name: hadolint

  - repo: https://github.com/EbodShojaei/bake
    rev: a39df91c8e2c8ee584f81ff8d7d00f137a5fc160  # v1.4.6
    hooks:
      - id: mbake-format
        args:
          - --config
          - .bake.toml
      - id: mbake-validate
        args:
          - --config
          - .bake.toml
        exclude: ^backend/

  - repo: https://github.com/adrienverge/yamllint.git
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530  # v1.38.0
    hooks:
      - id: yamllint
        args:
          - --format
          - parsable
          - --strict
        exclude: pnpm-lock.yaml

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: d0e12caebb2ab0ee8bf98181c8bfe9702bca103d  # v1.105.0
    hooks:
      - id: terraform_fmt
        files: ^infrastructure/.*\.(tf|tftest\.hcl)$
      - id: terraform_tflint
        files: ^infrastructure/.*\.tf$
        args:
          - --args=--config=__GIT_WORKING_DIR__/infrastructure/.tflint.hcl

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: aca6d4c8045a504e2812ea4bedff1d0a09e437bc  # v0.15.8
    hooks:
      - id: ruff-check
        args:
          - --fix
      - id: ruff-format

  - repo: https://github.com/djlint/djLint
    rev: 9112cb64851c95a7802358af285d21ad8b7f6437  # v1.36.4
    hooks:
      - id: djlint-reformat-django
        files: templates/.*.html
        entry: djlint --reformat
        types:
          - html

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: e72a3ca1632f0b11a07d171449fe447a7ff6795e  # v0.48.0
    hooks:
      - id: markdownlint
        args:
          - --fix
        files: \.md$

  - repo: https://github.com/jumanjihouse/pre-commit-hook-yamlfmt
    rev: 8d1b9cadaf854cb25bb0b0f5870e1cc66a083d6b  # 0.2.3
    hooks:
      - id: yamlfmt
        args:
          - --implicit_start
          - --mapping=2
          - --offset=2
          - --sequence=4
        exclude: (pnpm-lock.yaml|\.yamllint)

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: 8e5c80792e2ec0c87804d8ef915bf35e2caea6da  # v1.20.0
    hooks:
      - id: mypy
        additional_dependencies:
          - strawberry-graphql==0.315.7
          - strawberry-graphql-django==0.75.3
          - types-lxml==2026.2.16
          - types-python-dateutil==2.9.0.20260518
          - types-PyYAML==6.0.12.20260518
          - types-requests==2.33.0.20260518
        args:
          - --config-file
          - backend/pyproject.toml

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # v6.0.0
    hooks:
      - id: check-ast
      - id: check-builtin-literals
      - id: fix-byte-order-marker
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-json
        # tsconfig.json uses JSONC (comments).
        # Matches frontend/tsconfig.json and frontend/**/tsconfig.json
        exclude: ^frontend/(?:[^/]+/)*tsconfig\.json$
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
        exclude: pnpm-lock\.yaml$
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: frontend/src/types/__generated__
        exclude_types:
          - svg
      - id: file-contents-sorter
        args:
          - --unique
        files: (.github/workflows/check-pr-issue-skip-usernames.txt|cspell/custom-dict.txt)
      - id: mixed-line-ending
        args:
          - --fix=lf
      - id: name-tests-test
        args:
          - --pytest
        exclude: backend/tests/data
        files: backend/tests
      - id: trailing-whitespace
        exclude: pnpm-lock.yaml

  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca  # v1.7.12
    hooks:
      - id: actionlint-docker

  - repo: https://github.com/terraform-docs/terraform-docs
    rev: 9d4455198941806aa02ec14369de030cda2c2b59  # v0.24.0
    hooks:
      - id: terraform-docs-go
        args:
          - infrastructure/
        files: ^infrastructure/.*\.tf$|^infrastructure/\.terraform-docs\.ya?ml$

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: a007bb7dd9043d022292401abc3061cb1906b4bc  # v2.21.2
    hooks:
      - id: pyproject-fmt
        additional_dependencies:
          - toml-fmt-common<1.3.3

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: 9257c6050c0261b8c57e712f632dc4a8010109a9  # v1.25.2
    hooks:
      - id: zizmor
        args:
          - --min-severity=low
