name: Run backend tests

on:
  workflow_call:

env:
  FORCE_COLOR: 1

permissions: {}

jobs:
  run-unit-tests:
    name: Run unit tests
    permissions:
      actions: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          cache-dependency-path: backend/poetry.lock
          cache: poetry
          python-version: '3.13'

      - name: Set up backend dependencies cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          key: poetry-venv-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}
          path: backend/.venv

      - name: Install backend dependencies
        run: poetry install --no-interaction
        working-directory: backend

      - name: Run backend tests
        run: set -a && source .env.example && set +a && poetry run pytest tests/unit
        working-directory: backend

      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          if-no-files-found: error
          name: coverage-xml
          path: backend/coverage.xml
    timeout-minutes: 5

  upload-coverage-to-codecov:
    name: Upload coverage to Codecov
    needs: run-unit-tests
    uses: ./.github/workflows/upload-coverage-to-codecov.yaml
    with:
      artifact_name: coverage-xml
      artifact_path: backend
      coverage_path: backend/coverage.xml
      coverage_flags: backend
