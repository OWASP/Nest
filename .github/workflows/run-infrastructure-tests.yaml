name: Infrastructure tests

on:
  workflow_call:
    secrets:
      LOCALSTACK_AUTH_TOKEN:
        required: false

env:
  FORCE_COLOR: 1
  TF_PLUGIN_CACHE_DIR: /home/runner/.terraform.d/plugin-cache

permissions: {}

jobs:
  check-localstack:
    name: Check LocalStack availability
    runs-on: ubuntu-24.04-arm
    permissions: {}
    outputs:
      is_available: ${{ steps.check.outputs.is_available }}
    steps:
      - id: check
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
        run: |
          if [ -n "$LOCALSTACK_AUTH_TOKEN" ]; then
            echo "is_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_available=false" >> "$GITHUB_OUTPUT"
          fi

  run-infrastructure-tests:
    name: Infrastructure tests
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Terraform environment
        uses: ./.github/actions/setup-terraform-environment

      - name: Run tests
        run: make test-infrastructure
    timeout-minutes: 10

  infrastructure-integration-tests:
    name: Infrastructure integration tests
    needs: check-localstack
    if: ${{ needs.check-localstack.outputs.is_available == 'true' }}
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Terraform environment
        uses: ./.github/actions/setup-terraform-environment

      - name: Read LocalStack image tag from Dockerfile
        id: localstack-tag
        run: |
          tag=$(python3 infrastructure/scripts/run_tests.py --get-tag)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Start LocalStack
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
        uses: localstack/setup-localstack@7c8a0cb3405bc58be4c8f763f812aa000bc46303  # v0.3.2
        with:
          image-tag: ${{ steps.localstack-tag.outputs.tag }}

      - name: Run integration tests
        run: make test-infrastructure-integration
    timeout-minutes: 5
