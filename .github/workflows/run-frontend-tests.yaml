name: Run frontend tests

on:
  workflow_call:

env:
  FORCE_COLOR: 1

permissions: {}

jobs:
  run-unit-tests:
    name: Run unit tests
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53  # v6.0.1
        with:
          run_install: false
          version: 10.33.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          cache-dependency-path: frontend/pnpm-lock.yaml
          cache: pnpm
          node-version: 24

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        working-directory: frontend
        run: pnpm run test:unit

      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          if-no-files-found: error
          name: coverage-lcov
          path: frontend/coverage/lcov.info
    timeout-minutes: 10

  upload-coverage-to-codecov:
    name: Upload coverage to Codecov
    needs: run-unit-tests
    permissions:
      actions: read
      contents: read
      id-token: write
    uses: ./.github/workflows/upload-coverage-to-codecov.yaml
    with:
      artifact_name: coverage-lcov
      artifact_path: frontend/coverage/lcov.info
      coverage_flags: frontend
      coverage_path: frontend/coverage/lcov.info

  run-a11y-tests:
    name: Run accessibility tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53  # v6.0.1
        with:
          run_install: false
          version: 10.33.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          cache-dependency-path: frontend/pnpm-lock.yaml
          cache: pnpm
          node-version: 24

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run frontend a11y tests
        working-directory: frontend
        run: pnpm run test:a11y
    timeout-minutes: 5
