name: GraphQL checks

on:
  workflow_call:

env:
  FORCE_COLOR: 1

permissions: {}

jobs:
  run-graphql-checks:
    name: GraphQL
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    services:
      cache:
        image: redis:8.8.0-alpine3.23@sha256:09160599abd229764c0fb44cb6be640294e1d360a54b19985ab4843dcf2d90f1
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-retries=5
          --health-timeout=5s
        ports:
          - 6379:6379
      db:
        env:
          POSTGRES_DB: nest_db_e2e
          POSTGRES_PASSWORD: nest_user_e2e_password
          POSTGRES_USER: nest_user_e2e
        image: pgvector/pgvector:pg16@sha256:00ba258a66dac104fd5171074a0084462a64a1369d8513f3d0a634e2f24d15bc
        options: >-
          --health-cmd="pg_isready -U nest_user_e2e -d nest_db_e2e -h localhost -p 5432"
          --health-interval=5s
          --health-retries=5
          --health-timeout=5s
        ports:
          - 5432:5432
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up backend environment
        uses: ./.github/actions/setup-backend-environment
        with:
          backend_port: 8000
          db_name: nest_db_e2e
          db_password: nest_user_e2e_password
          db_username: nest_user_e2e
          env_file: .env.e2e-tests

      - name: Install frontend dependencies
        uses: ./.github/actions/install-frontend-dependencies

      - name: Run GraphQL check
        env:
          PUBLIC_API_URL: http://localhost:8000
        run: make check-graphql
    timeout-minutes: 10
