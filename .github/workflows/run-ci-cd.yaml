name: Run CI/CD

on:
  merge_group:
  pull_request:
    branches:
      - dev
      - feature/**
      - main
  push:
    branches:
      - dev
      - feature/**
      - main
  release:
    types:
      - published
  schedule:
    - cron: 0 2 * * *  # Run staging deploy daily at 2am UTC.
  workflow_dispatch:

permissions: {}

env:
  FORCE_COLOR: 1

jobs:
  run-code-quality-checks:
    name: Run code quality checks
    permissions:
      contents: read
    uses: ./.github/workflows/run-code-quality-checks.yaml

  run-backend-tests:
    name: Run backend tests
    needs:
      - run-code-quality-checks
    permissions:
      actions: write
      contents: read
      id-token: write
    uses: ./.github/workflows/run-backend-tests.yaml

  run-frontend-tests:
    name: Run frontend tests
    needs:
      - run-code-quality-checks
    permissions:
      actions: read
      contents: read
      id-token: write
    uses: ./.github/workflows/run-frontend-tests.yaml

  run-e2e-tests:
    name: Run e2e tests
    needs:
      - run-code-quality-checks
    permissions:
      contents: read
    uses: ./.github/workflows/run-e2e-tests.yaml

  run-graphql-fuzz-tests:
    name: Run GraphQL fuzz tests
    if: false
    needs:
      - run-code-quality-checks
    uses: ./.github/workflows/run-fuzz-tests.yaml
    with:
      test-file: graphql_test.py

  run-rest-fuzz-tests:
    name: Run REST fuzz tests
    needs:
      - run-code-quality-checks
    uses: ./.github/workflows/run-fuzz-tests.yaml
    with:
      test-file: rest_test.py
      rest-url: http://localhost:9500/api/v0

  run-infrastructure-tests:
    name: Run Infrastructure tests
    needs:
      - run-code-quality-checks
    permissions:
      contents: read
    uses: ./.github/workflows/run-infrastructure-tests.yaml

  set-release-version:
    name: Set release version
    if: |
      github.repository == 'OWASP/Nest' &&
      (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'release' && github.event.action == 'published')
      )
    needs:
      - run-backend-tests
      - run-e2e-tests
      - run-frontend-tests
      - run-infrastructure-tests
      - run-rest-fuzz-tests
    permissions: {}
    uses: ./.github/workflows/set-release-version.yaml

  build-staging-images:
    name: Build Staging Images
    if: |
      github.repository == 'OWASP/Nest' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs:
      - set-release-version
    permissions:
      contents: read
    uses: ./.github/workflows/build-images.yaml
    with:
      aws_role_session_name: GitHubActions-BuildStagingImages
      aws_role_name: nest-staging-terraform
      backend_ecr_cache_repo: nest-staging-backend-cache
      backend_ecr_repo: nest-staging-backend
      backend_uid: '1001'
      backend_gid: '1001'
      environment: staging
      frontend_ecr_cache_repo: nest-staging-frontend-cache
      frontend_ecr_repo: nest-staging-frontend
      release_version: ${{ needs.set-release-version.outputs.release_version }}

  scan-staging-images:
    name: Scan Staging Images
    needs:
      - build-staging-images
      - set-release-version
    environment: staging
    env:
      BACKEND_IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/nest-staging-backend:${{ needs.set-release-version.outputs.release_version
        }}
      FRONTEND_IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/nest-staging-frontend:${{ needs.set-release-version.outputs.release_version
        }}
      RELEASE_VERSION: ${{ needs.set-release-version.outputs.release_version }}
    permissions:
      actions: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885  # v6.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-duration-seconds: 3600
          role-external-id: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
          role-session-name: GitHubActions-ScanStagingImages
          role-skip-session-tagging: true
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/nest-staging-terraform

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2.1.5

      - name: Pull container images
        run: |
          docker pull "$BACKEND_IMAGE"
          docker pull "$FRONTEND_IMAGE"

      - name: Cache Trivy DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .trivy-cache
          key: trivy-${{ runner.os }}-${{ hashFiles('docker/trivy/Dockerfile') }}
          restore-keys: trivy-${{ runner.os }}-

      - name: Run Trivy security scan via Makefile
        run: |
          make security-scan-backend-image BACKEND_IMAGE_NAME="$BACKEND_IMAGE"
          make security-scan-frontend-image FRONTEND_IMAGE_NAME="$FRONTEND_IMAGE"

      - name: Generate SBOM for backend image
        run: |
          make sbom-backend-image BACKEND_IMAGE_NAME="$BACKEND_IMAGE"

      - name: Generate SBOM for frontend image
        run: |
          make sbom-frontend-image FRONTEND_IMAGE_NAME="$FRONTEND_IMAGE"

      - name: Upload SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: staging-sbom-${{ env.RELEASE_VERSION }}
          path: |
            backend-sbom-${{ env.RELEASE_VERSION }}.cdx.json
            frontend-sbom-${{ env.RELEASE_VERSION }}.cdx.json
    timeout-minutes: 10

  bootstrap-nest-staging-infrastructure:
    name: Bootstrap Nest Staging Infrastructure
    if: |
      (github.repository == 'OWASP/Nest' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'))
    needs:
      - scan-staging-images
    permissions:
      contents: read
    uses: ./.github/workflows/bootstrap-infrastructure.yaml
    with:
      environment: staging

  deploy-staging-nest:
    name: Plan and Deploy Nest Staging
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
    environment: staging
    if: |
      github.repository == 'OWASP/Nest' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs:
      - bootstrap-nest-staging-infrastructure
      - build-staging-images
      - set-release-version
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885  # v6.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-duration-seconds: 3600
          role-external-id: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
          role-session-name: GitHubActions-StagingDeploy
          role-skip-session-tagging: true
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/nest-staging-terraform

      - name: Apply infrastructure changes
        uses: ./.github/actions/apply-infrastructure-changes
        with:
          summary-title: Terraform Plan Output
          tfbackend-path: infrastructure/live/terraform.tfbackend
          tfbackend-content: |
            bucket="${{ secrets.TF_STATE_BUCKET_NAME }}"
            key="staging/terraform.tfstate"
            region="${{ vars.AWS_REGION }}"
          tfvars-path: infrastructure/live/terraform.tfvars
          tfvars-content: |
            availability_zones=${{ vars.AWS_AVAILABILITY_ZONES }}
            aws_region="${{ vars.AWS_REGION }}"
            backend_image_tag="${{ needs.set-release-version.outputs.release_version }}"
            backend_use_fargate_spot=true
            domain_name="${{ vars.DOMAIN_NAME }}"
            django_configuration="Staging"
            django_release_version="${{ needs.set-release-version.outputs.release_version }}"
            django_settings_module="settings.staging"
            enable_cron_tasks=false
            enable_nat_gateway=false
            enable_rds_proxy=false
            environment="staging"
            frontend_use_fargate_spot=true
            frontend_image_tag="${{ needs.set-release-version.outputs.release_version }}"
            project_name="nest"
            tasks_use_fargate_spot=true
          working-directory: infrastructure/live

      - name: Capture terraform outputs
        id: tf-outputs
        working-directory: infrastructure/live
        run: |
          echo "backend_cluster_name=$(terraform output -raw backend_cluster_name)" >> $GITHUB_OUTPUT
          echo "backend_service_name=$(terraform output -raw backend_service_name)" >> $GITHUB_OUTPUT
          echo "frontend_cluster_name=$(terraform output -raw frontend_cluster_name)" >> $GITHUB_OUTPUT
          echo "frontend_service_name=$(terraform output -raw frontend_service_name)" >> $GITHUB_OUTPUT
          echo "nat_gateway_enabled=$(terraform output -raw nat_gateway_enabled)" >> $GITHUB_OUTPUT
          echo "tasks_cluster_name=$(terraform output -raw tasks_cluster_name)" >> $GITHUB_OUTPUT
          echo "tasks_security_group_id=$(terraform output -raw tasks_security_group_id)" >> $GITHUB_OUTPUT
          echo "tasks_subnet_ids=$(terraform output -json tasks_subnet_ids | jq -r 'join(",")')" >> $GITHUB_OUTPUT

      - name: Run ECS migrate task
        id: migrate-task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
          NAT_GATEWAY_ENABLED: ${{ steps.tf-outputs.outputs.nat_gateway_enabled }}
          TASKS_SECURITY_GROUP_ID: ${{ steps.tf-outputs.outputs.tasks_security_group_id }}
          TASK_DEFINITION: nest-staging-migrate
          TASKS_SUBNET_IDS: ${{ steps.tf-outputs.outputs.tasks_subnet_ids }}
        run: |
          ASSIGN_PUBLIC_IP=$([ "$NAT_GATEWAY_ENABLED" = "true" ] && echo "DISABLED" || echo "ENABLED")
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$TASKS_SUBNET_IDS],securityGroups=[$TASKS_SECURITY_GROUP_ID],assignPublicIp=$ASSIGN_PUBLIC_IP}" \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT

      - name: Wait for migrate task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
        run: |
          aws ecs wait tasks-stopped \
            --cluster "$CLUSTER_NAME" \
            --tasks "${{ steps.migrate-task.outputs.task_arn }}"

      - name: Check migrate task exit code
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
        run: |
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER_NAME" \
            --tasks "${{ steps.migrate-task.outputs.task_arn }}" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migrate task failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migrate task completed successfully"

      - name: Run ECS index-data task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
          NAT_GATEWAY_ENABLED: ${{ steps.tf-outputs.outputs.nat_gateway_enabled }}
          TASK_DEFINITION: nest-staging-index-data
          TASKS_SECURITY_GROUP_ID: ${{ steps.tf-outputs.outputs.tasks_security_group_id }}
          TASKS_SUBNET_IDS: ${{ steps.tf-outputs.outputs.tasks_subnet_ids }}
        run: |
          ASSIGN_PUBLIC_IP=$([ "$NAT_GATEWAY_ENABLED" = "true" ] && echo "DISABLED" || echo "ENABLED")
          RESPONSE=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$TASKS_SUBNET_IDS],securityGroups=[$TASKS_SECURITY_GROUP_ID],assignPublicIp=$ASSIGN_PUBLIC_IP}")

          FAILURE_COUNT=$(echo "$RESPONSE" | jq '.failures | length')
          TASK_COUNT=$(echo "$RESPONSE" | jq '.tasks | length')

          if [ "$FAILURE_COUNT" -gt 0 ]; then
            echo "Error: ECS run-task for $TASK_DEFINITION on cluster $CLUSTER_NAME returned failures:"
            echo "$RESPONSE" | jq '.failures'
            exit 1
          fi

          if [ "$TASK_COUNT" -eq 0 ]; then
            echo "Error: ECS run-task for $TASK_DEFINITION on cluster $CLUSTER_NAME returned no tasks"
            echo "$RESPONSE"
            exit 1
          fi

          echo "Index-data task started successfully (runs async, ~30 min)"

      - name: Wait for backend service stability
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.backend_cluster_name }}
          SERVICE_NAME: ${{ steps.tf-outputs.outputs.backend_service_name }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"

      - name: Wait for frontend service stability
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.frontend_cluster_name }}
          SERVICE_NAME: ${{ steps.tf-outputs.outputs.frontend_service_name }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"
    timeout-minutes: 60

  run-staging-lighthouse-ci:
    name: Run staging Lighthouse CI
    needs:
      - deploy-staging-nest
    permissions:
      contents: read
    uses: ./.github/workflows/run-lighthouse-ci.yaml
    with:
      base_url: https://nest.owasp.dev

  run-staging-zap-baseline-scan:
    name: Run staging ZAP baseline scan
    needs:
      - deploy-staging-nest
    permissions:
      contents: read
    uses: ./.github/workflows/run-zap-baseline-scan.yaml
    with:
      base_url: https://nest.owasp.dev

  build-production-images:
    name: Build Production Images
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - set-release-version
    permissions:
      contents: read
    uses: ./.github/workflows/build-images.yaml
    with:
      aws_role_session_name: GitHubActions-BuildProductionImages
      aws_role_name: nest-production-terraform
      backend_ecr_cache_repo: nest-production-backend-cache
      backend_ecr_repo: nest-production-backend
      backend_uid: '1002'
      backend_gid: '1002'
      environment: production
      frontend_ecr_cache_repo: nest-production-frontend-cache
      frontend_ecr_repo: nest-production-frontend
      release_version: ${{ needs.set-release-version.outputs.release_version }}

  scan-production-images:
    name: Scan Production Images
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - build-production-images
      - set-release-version
    environment: production
    env:
      BACKEND_IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/nest-production-backend:${{ needs.set-release-version.outputs.release_version
        }}
      FRONTEND_IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/nest-production-frontend:${{ needs.set-release-version.outputs.release_version
        }}
      RELEASE_VERSION: ${{ needs.set-release-version.outputs.release_version }}
    permissions:
      # Broader than typical scan jobs: required for "Upload SBOMs" (gh release upload).
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-duration-seconds: 3600
          role-external-id: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
          role-session-name: GitHubActions-ScanProductionImages
          role-skip-session-tagging: true
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/nest-production-terraform

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7  # v2.1.4

      - name: Pull container images
        run: |
          docker pull "$BACKEND_IMAGE"
          docker pull "$FRONTEND_IMAGE"

      - name: Cache Trivy DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .trivy-cache
          key: trivy-${{ runner.os }}-${{ hashFiles('docker/trivy/Dockerfile') }}
          restore-keys: trivy-${{ runner.os }}-

      - name: Run Trivy security scan via Makefile
        run: |
          make security-scan-backend-image BACKEND_IMAGE_NAME="$BACKEND_IMAGE"
          make security-scan-frontend-image FRONTEND_IMAGE_NAME="$FRONTEND_IMAGE"

      - name: Generate SBOM for backend image
        run: |
          make sbom-backend-image BACKEND_IMAGE_NAME="$BACKEND_IMAGE"

      - name: Generate SBOM for frontend image
        run: |
          make sbom-frontend-image FRONTEND_IMAGE_NAME="$FRONTEND_IMAGE"

      - name: Upload SBOMs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            backend-sbom-${{ env.RELEASE_VERSION }}.cdx.json \
            frontend-sbom-${{ env.RELEASE_VERSION }}.cdx.json
    timeout-minutes: 10

  bootstrap-nest-production-infrastructure:
    name: Bootstrap Nest Production Infrastructure
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - scan-production-images
    permissions:
      contents: read
    uses: ./.github/workflows/bootstrap-infrastructure.yaml
    with:
      environment: production

  deploy-production-nest:
    name: Plan and Deploy Nest Production
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
    environment: production
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - bootstrap-nest-production-infrastructure
      - build-production-images
      - set-release-version
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885  # v6.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-duration-seconds: 3600
          role-external-id: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
          role-session-name: GitHubActions-ProductionDeploy
          role-skip-session-tagging: true
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/nest-production-terraform

      - name: Apply infrastructure changes
        uses: ./.github/actions/apply-infrastructure-changes
        with:
          summary-title: Terraform Plan Output
          tfbackend-path: infrastructure/live/terraform.tfbackend
          tfbackend-content: |
            bucket="${{ secrets.TF_STATE_BUCKET_NAME }}"
            key="production/terraform.tfstate"
            region="${{ vars.AWS_REGION }}"
          tfvars-path: infrastructure/live/terraform.tfvars
          tfvars-content: |
            availability_zones=${{ vars.AWS_AVAILABILITY_ZONES }}
            aws_region="${{ vars.AWS_REGION }}"
            backend_image_tag="${{ needs.set-release-version.outputs.release_version }}"
            backend_use_fargate_spot=false
            domain_name="${{ vars.DOMAIN_NAME }}"
            django_configuration="Production"
            django_release_version="${{ needs.set-release-version.outputs.release_version }}"
            django_settings_module="settings.production"
            enable_additional_parameters=true
            enable_cron_tasks=true
            enable_nat_gateway=true
            enable_rds_proxy=true
            environment="production"
            frontend_use_fargate_spot=false
            frontend_image_tag="${{ needs.set-release-version.outputs.release_version }}"
            project_name="nest"
            tasks_use_fargate_spot=false
          working-directory: infrastructure/live

      - name: Capture terraform outputs
        id: tf-outputs
        working-directory: infrastructure/live
        run: |
          echo "backend_cluster_name=$(terraform output -raw backend_cluster_name)" >> $GITHUB_OUTPUT
          echo "backend_service_name=$(terraform output -raw backend_service_name)" >> $GITHUB_OUTPUT
          echo "frontend_cluster_name=$(terraform output -raw frontend_cluster_name)" >> $GITHUB_OUTPUT
          echo "frontend_service_name=$(terraform output -raw frontend_service_name)" >> $GITHUB_OUTPUT
          echo "nat_gateway_enabled=$(terraform output -raw nat_gateway_enabled)" >> $GITHUB_OUTPUT
          echo "tasks_cluster_name=$(terraform output -raw tasks_cluster_name)" >> $GITHUB_OUTPUT
          echo "tasks_security_group_id=$(terraform output -raw tasks_security_group_id)" >> $GITHUB_OUTPUT
          echo "tasks_subnet_ids=$(terraform output -json tasks_subnet_ids | jq -r 'join(",")')" >> $GITHUB_OUTPUT

      - name: Run ECS migrate task
        id: migrate-task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
          NAT_GATEWAY_ENABLED: ${{ steps.tf-outputs.outputs.nat_gateway_enabled }}
          TASKS_SECURITY_GROUP_ID: ${{ steps.tf-outputs.outputs.tasks_security_group_id }}
          TASK_DEFINITION: nest-production-migrate
          TASKS_SUBNET_IDS: ${{ steps.tf-outputs.outputs.tasks_subnet_ids }}
        run: |
          ASSIGN_PUBLIC_IP=$([ "$NAT_GATEWAY_ENABLED" = "true" ] && echo "DISABLED" || echo "ENABLED")
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$TASKS_SUBNET_IDS],securityGroups=[$TASKS_SECURITY_GROUP_ID],assignPublicIp=$ASSIGN_PUBLIC_IP}" \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT

      - name: Wait for migrate task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
        run: |
          aws ecs wait tasks-stopped \
            --cluster "$CLUSTER_NAME" \
            --tasks "${{ steps.migrate-task.outputs.task_arn }}"

      - name: Check migrate task exit code
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
        run: |
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER_NAME" \
            --tasks "${{ steps.migrate-task.outputs.task_arn }}" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migrate task failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migrate task completed successfully"

      - name: Run ECS index-data task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
          NAT_GATEWAY_ENABLED: ${{ steps.tf-outputs.outputs.nat_gateway_enabled }}
          TASK_DEFINITION: nest-production-index-data
          TASKS_SECURITY_GROUP_ID: ${{ steps.tf-outputs.outputs.tasks_security_group_id }}
          TASKS_SUBNET_IDS: ${{ steps.tf-outputs.outputs.tasks_subnet_ids }}
        run: |
          ASSIGN_PUBLIC_IP=$([ "$NAT_GATEWAY_ENABLED" = "true" ] && echo "DISABLED" || echo "ENABLED")
          RESPONSE=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$TASKS_SUBNET_IDS],securityGroups=[$TASKS_SECURITY_GROUP_ID],assignPublicIp=$ASSIGN_PUBLIC_IP}")

          FAILURE_COUNT=$(echo "$RESPONSE" | jq '.failures | length')
          TASK_COUNT=$(echo "$RESPONSE" | jq '.tasks | length')

          if [ "$FAILURE_COUNT" -gt 0 ]; then
            echo "Error: ECS run-task for $TASK_DEFINITION on cluster $CLUSTER_NAME returned failures:"
            echo "$RESPONSE" | jq '.failures'
            exit 1
          fi

          if [ "$TASK_COUNT" -eq 0 ]; then
            echo "Error: ECS run-task for $TASK_DEFINITION on cluster $CLUSTER_NAME returned no tasks"
            echo "$RESPONSE"
            exit 1
          fi

          echo "Index-data task started successfully (runs async, ~30 min)"

      - name: Wait for backend service stability
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.backend_cluster_name }}
          SERVICE_NAME: ${{ steps.tf-outputs.outputs.backend_service_name }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"

      - name: Wait for frontend service stability
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.frontend_cluster_name }}
          SERVICE_NAME: ${{ steps.tf-outputs.outputs.frontend_service_name }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"

  run-production-lighthouse-ci:
    name: Run production Lighthouse CI
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - deploy-production-nest
    permissions:
      contents: read
    uses: ./.github/workflows/run-lighthouse-ci.yaml
    with:
      base_url: https://nest.owasp.org

  run-production-zap-baseline-scan:
    name: Run production ZAP baseline scan
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - deploy-production-nest
    permissions:
      contents: read
    uses: ./.github/workflows/run-zap-baseline-scan.yaml
    with:
      base_url: https://nest.owasp.org
