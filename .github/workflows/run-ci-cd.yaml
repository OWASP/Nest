name: Run CI/CD

on:
  merge_group:
  pull_request:
    branches:
      - dev
      - feature/**
      - main
  push:
    branches:
      - dev
      - feature/**
      - main
  release:
    types:
      - published
  schedule:
    - cron: 0 2 * * *  # Run staging deploy daily at 2am UTC.
  workflow_dispatch:

permissions: {}

env:
  FORCE_COLOR: 1

jobs:
  run-code-quality-checks:
    name: Run code quality checks
    permissions:
      contents: read
    uses: ./.github/workflows/run-code-quality-checks.yaml

  run-backend-tests:
    name: Run backend tests
    needs:
      - run-code-quality-checks
    permissions:
      actions: write
      contents: read
      id-token: write
    uses: ./.github/workflows/run-backend-tests.yaml

  run-frontend-tests:
    name: Run frontend tests
    needs:
      - run-code-quality-checks
    permissions:
      actions: read
      contents: read
      id-token: write
    uses: ./.github/workflows/run-frontend-tests.yaml

  run-e2e-tests:
    name: Run e2e tests
    needs:
      - run-code-quality-checks
    permissions:
      contents: read
    uses: ./.github/workflows/run-e2e-tests.yaml

  run-graphql-fuzz-tests:
    name: Run GraphQL fuzz tests
    if: false
    needs:
      - run-code-quality-checks
    uses: ./.github/workflows/run-fuzz-tests.yaml
    with:
      test-file: graphql_test.py

  run-rest-fuzz-tests:
    name: Run REST fuzz tests
    needs:
      - run-code-quality-checks
    uses: ./.github/workflows/run-fuzz-tests.yaml
    with:
      test-file: rest_test.py
      rest-url: http://localhost:9500/api/v0

  run-infrastructure-tests:
    name: Run Infrastructure tests
    needs:
      - run-code-quality-checks
    permissions:
      contents: read
    uses: ./.github/workflows/run-infrastructure-tests.yaml

  set-release-version:
    name: Set release version
    if: |
      github.repository == 'OWASP/Nest' &&
      (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'release' && github.event.action == 'published')
      )
    needs:
      - run-backend-tests
      - run-e2e-tests
      - run-frontend-tests
      - run-infrastructure-tests
      - run-rest-fuzz-tests
    permissions: {}
    uses: ./.github/workflows/set-release-version.yaml

  build-staging-images:
    name: Build Staging Images
    if: |
      github.repository == 'OWASP/Nest' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs:
      - set-release-version
    permissions:
      contents: read
    uses: ./.github/workflows/build-images.yaml
    with:
      aws_role_session_name: GitHubActions-BuildStagingImages
      aws_role_name: nest-staging-terraform
      backend_ecr_cache_repo: nest-staging-backend-cache
      backend_ecr_repo: nest-staging-backend
      backend_uid: '1001'
      backend_gid: '1001'
      environment: staging
      frontend_ecr_cache_repo: nest-staging-frontend-cache
      frontend_ecr_repo: nest-staging-frontend
      release_version: ${{ needs.set-release-version.outputs.release_version }}

  scan-staging-images:
    name: Scan Staging Images
    needs:
      - build-staging-images
      - set-release-version
    environment: staging
    env:
      BACKEND_IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/nest-staging-backend:${{ needs.set-release-version.outputs.release_version
        }}
      FRONTEND_IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/nest-staging-frontend:${{ needs.set-release-version.outputs.release_version
        }}
      RELEASE_VERSION: ${{ needs.set-release-version.outputs.release_version }}
    permissions:
      actions: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885  # v6.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-duration-seconds: 3600
          role-external-id: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
          role-session-name: GitHubActions-ScanStagingImages
          role-skip-session-tagging: true
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/nest-staging-terraform

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2.1.5

      - name: Pull container images
        run: |
          docker pull "$BACKEND_IMAGE"
          docker pull "$FRONTEND_IMAGE"

      - name: Cache Trivy DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .trivy-cache
          key: trivy-${{ runner.os }}-${{ hashFiles('docker/trivy/Dockerfile') }}
          restore-keys: trivy-${{ runner.os }}-

      - name: Run Trivy security scan via Makefile
        run: |
          make security-scan-backend-image BACKEND_IMAGE_NAME="$BACKEND_IMAGE"
          make security-scan-frontend-image FRONTEND_IMAGE_NAME="$FRONTEND_IMAGE"

      - name: Generate SBOM for backend image
        run: |
          make sbom-backend-image BACKEND_IMAGE_NAME="$BACKEND_IMAGE"

      - name: Generate SBOM for frontend image
        run: |
          make sbom-frontend-image FRONTEND_IMAGE_NAME="$FRONTEND_IMAGE"

      - name: Upload SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: staging-sbom-${{ env.RELEASE_VERSION }}
          path: |
            backend-sbom-${{ env.RELEASE_VERSION }}.cdx.json
            frontend-sbom-${{ env.RELEASE_VERSION }}.cdx.json
    timeout-minutes: 10

  bootstrap-nest-staging-infrastructure:
    name: Bootstrap Nest Staging Infrastructure
    if: |
      (github.repository == 'OWASP/Nest' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'))
    needs:
      - scan-staging-images
    permissions:
      contents: read
    uses: ./.github/workflows/bootstrap-infrastructure.yaml
    with:
      environment: staging

  deploy-staging-nest:
    name: Plan and Deploy Nest Staging
    if: |
      github.repository == 'OWASP/Nest' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs:
      - bootstrap-nest-staging-infrastructure
    permissions:
      contents: read
    uses: ./.github/workflows/deploy-nest.yaml
    with:
      aws_role_name: nest-staging-terraform
      aws_role_session_name: GitHubActions-StagingDeploy
      backend_use_fargate_spot: true
      django_configuration: Staging
      django_settings_module: settings.staging
      enable_cron_tasks: false
      enable_nat_gateway: false
      enable_rds_proxy: false
      environment: staging
      frontend_use_fargate_spot: true
      index_task_definition: nest-staging-index-data
      migrate_task_definition: nest-staging-migrate
      release_version: ${{ needs.set-release-version.outputs.release_version }}
      tasks_use_fargate_spot: true
      tf_state_key: staging/terraform.tfstate

  run-staging-lighthouse-ci:
    name: Run staging Lighthouse CI
    needs:
      - deploy-staging-nest
    permissions:
      contents: read
    uses: ./.github/workflows/run-lighthouse-ci.yaml
    with:
      base_url: https://nest.owasp.dev

  run-staging-zap-baseline-scan:
    name: Run staging ZAP baseline scan
    needs:
      - deploy-staging-nest
    permissions:
      contents: read
    uses: ./.github/workflows/run-zap-baseline-scan.yaml
    with:
      base_url: https://nest.owasp.dev

  build-production-images:
    name: Build Production Images
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - set-release-version
    permissions:
      contents: read
    uses: ./.github/workflows/build-images.yaml
    with:
      aws_role_session_name: GitHubActions-BuildProductionImages
      aws_role_name: nest-production-terraform
      backend_ecr_cache_repo: nest-production-backend-cache
      backend_ecr_repo: nest-production-backend
      backend_uid: '1002'
      backend_gid: '1002'
      environment: production
      frontend_ecr_cache_repo: nest-production-frontend-cache
      frontend_ecr_repo: nest-production-frontend
      release_version: ${{ needs.set-release-version.outputs.release_version }}

  scan-production-images:
    name: Scan Production Images
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - build-production-images
      - set-release-version
    environment: production
    env:
      BACKEND_IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/nest-production-backend:${{ needs.set-release-version.outputs.release_version
        }}
      FRONTEND_IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/nest-production-frontend:${{ needs.set-release-version.outputs.release_version
        }}
      RELEASE_VERSION: ${{ needs.set-release-version.outputs.release_version }}
    permissions:
      # Broader than typical scan jobs: required for "Upload SBOMs" (gh release upload).
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-duration-seconds: 3600
          role-external-id: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
          role-session-name: GitHubActions-ScanProductionImages
          role-skip-session-tagging: true
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/nest-production-terraform

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7  # v2.1.4

      - name: Pull container images
        run: |
          docker pull "$BACKEND_IMAGE"
          docker pull "$FRONTEND_IMAGE"

      - name: Cache Trivy DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .trivy-cache
          key: trivy-${{ runner.os }}-${{ hashFiles('docker/trivy/Dockerfile') }}
          restore-keys: trivy-${{ runner.os }}-

      - name: Run Trivy security scan via Makefile
        run: |
          make security-scan-backend-image BACKEND_IMAGE_NAME="$BACKEND_IMAGE"
          make security-scan-frontend-image FRONTEND_IMAGE_NAME="$FRONTEND_IMAGE"

      - name: Generate SBOM for backend image
        run: |
          make sbom-backend-image BACKEND_IMAGE_NAME="$BACKEND_IMAGE"

      - name: Generate SBOM for frontend image
        run: |
          make sbom-frontend-image FRONTEND_IMAGE_NAME="$FRONTEND_IMAGE"

      - name: Upload SBOMs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            backend-sbom-${{ env.RELEASE_VERSION }}.cdx.json \
            frontend-sbom-${{ env.RELEASE_VERSION }}.cdx.json
    timeout-minutes: 10

  bootstrap-nest-production-infrastructure:
    name: Bootstrap Nest Production Infrastructure
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - scan-production-images
    permissions:
      contents: read
    uses: ./.github/workflows/bootstrap-infrastructure.yaml
    with:
      environment: production

  deploy-production-nest:
    name: Plan and Deploy Nest Production
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - bootstrap-nest-production-infrastructure
    permissions:
      contents: read
    uses: ./.github/workflows/deploy-nest.yaml
    with:
      aws_role_name: nest-production-terraform
      aws_role_session_name: GitHubActions-ProductionDeploy
      backend_use_fargate_spot: false
      django_configuration: Production
      django_settings_module: settings.production
      enable_additional_parameters: true
      enable_cron_tasks: true
      enable_nat_gateway: true
      enable_rds_proxy: true
      environment: production
      frontend_use_fargate_spot: false
      index_task_definition: nest-production-index-data
      migrate_task_definition: nest-production-migrate
      release_version: ${{ needs.set-release-version.outputs.release_version }}
      tasks_use_fargate_spot: false
      tf_state_key: production/terraform.tfstate

  run-production-lighthouse-ci:
    name: Run production Lighthouse CI
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - deploy-production-nest
    permissions:
      contents: read
    uses: ./.github/workflows/run-lighthouse-ci.yaml
    with:
      base_url: https://nest.owasp.org

  run-production-zap-baseline-scan:
    name: Run production ZAP baseline scan
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - deploy-production-nest
    permissions:
      contents: read
    uses: ./.github/workflows/run-zap-baseline-scan.yaml
    with:
      base_url: https://nest.owasp.org
