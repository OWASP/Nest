name: Run CI/CD

on:
  merge_group:
  pull_request:
    branches:
      - dev
      - feature/**
      - main
  push:
    branches:
      - dev
      - feature/**
      - main
  release:
    types:
      - published
  schedule:
    - cron: 0 2 * * *  # Run staging deploy daily at 2am UTC.
  workflow_dispatch:

permissions: {}

env:
  FORCE_COLOR: 1

jobs:
  run-code-quality-checks:
    name: Run code quality checks
    permissions:
      contents: read
    uses: ./.github/workflows/run-code-quality-checks.yaml

  run-backend-tests:
    name: Run backend tests
    needs:
      - run-code-quality-checks
    permissions:
      actions: write
      contents: read
      id-token: write
    uses: ./.github/workflows/run-backend-tests.yaml

  run-frontend-tests:
    name: Run frontend tests
    needs:
      - run-code-quality-checks
    permissions:
      actions: read
      contents: read
      id-token: write
    uses: ./.github/workflows/run-frontend-tests.yaml

  run-e2e-tests:
    name: Run e2e tests
    needs:
      - run-code-quality-checks
    permissions:
      contents: read
    uses: ./.github/workflows/run-e2e-tests.yaml

  run-graphql-fuzz-tests:
    name: Run GraphQL fuzz tests
    if: false
    needs:
      - run-code-quality-checks
    uses: ./.github/workflows/run-fuzz-tests.yaml
    with:
      test-file: graphql_test.py

  run-rest-fuzz-tests:
    name: Run REST fuzz tests
    needs:
      - run-code-quality-checks
    uses: ./.github/workflows/run-fuzz-tests.yaml
    with:
      test-file: rest_test.py
      rest-url: http://localhost:9500/api/v0

  run-infrastructure-tests:
    name: Run Infrastructure tests
    needs:
      - run-code-quality-checks
    permissions:
      contents: read
    uses: ./.github/workflows/run-infrastructure-tests.yaml

  set-release-version:
    name: Set release version
    if: |
      github.repository == 'OWASP/Nest' &&
      (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'release' && github.event.action == 'published')
      )
    needs:
      - run-backend-tests
      - run-e2e-tests
      - run-frontend-tests
      - run-infrastructure-tests
      - run-rest-fuzz-tests
    permissions: {}
    uses: ./.github/workflows/set-release-version.yaml

  build-staging-images:
    name: Build Staging Images
    env:
      RELEASE_VERSION: ${{ needs.set-release-version.outputs.release_version }}
    environment: staging
    if: |
      github.repository == 'OWASP/Nest' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs:
      - set-release-version
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-duration-seconds: 3600
          role-external-id: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
          role-session-name: GitHubActions-BuildStagingImages
          role-skip-session-tagging: true
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/nest-staging-terraform

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7  # v2.1.4

      - name: Build backend image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          build-args: |
            OWASP_GID=1001
            OWASP_UID=1001
          cache-from: |
            type=gha
            type=registry,ref=owasp/nest:backend-staging-cache
          cache-to: |
            type=registry,ref=owasp/nest:backend-staging-cache
          context: backend
          file: docker/backend/Dockerfile
          load: true
          platforms: linux/amd64
          push: true
          tags: |
            owasp/nest:backend-staging
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/nest-staging-backend:${{ env.RELEASE_VERSION }}

      - name: Prepare frontend public environment
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.VITE_API_URL }}
          NEXT_PUBLIC_CSRF_URL: ${{ secrets.VITE_CSRF_URL }}
          NEXT_PUBLIC_ENVIRONMENT: ${{ secrets.VITE_ENVIRONMENT }}
          NEXT_PUBLIC_GRAPHQL_URL: ${{ secrets.VITE_GRAPHQL_URL }}
          NEXT_PUBLIC_GTM_ID: ${{ secrets.NEXT_PUBLIC_GTM_ID }}
          NEXT_PUBLIC_IDX_URL: ${{ secrets.VITE_IDX_URL }}
          NEXT_PUBLIC_IS_PROJECT_HEALTH_ENABLED: ${{ secrets.NEXT_PUBLIC_IS_PROJECT_HEALTH_ENABLED }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: |
          umask 377
          cat > frontend/.env <<EOF
          NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
          NEXT_PUBLIC_CSRF_URL=$NEXT_PUBLIC_CSRF_URL
          NEXT_PUBLIC_ENVIRONMENT=$NEXT_PUBLIC_ENVIRONMENT
          NEXT_PUBLIC_GRAPHQL_URL=$NEXT_PUBLIC_GRAPHQL_URL
          NEXT_PUBLIC_GTM_ID=$NEXT_PUBLIC_GTM_ID
          NEXT_PUBLIC_IDX_URL=$NEXT_PUBLIC_IDX_URL
          NEXT_PUBLIC_IS_PROJECT_HEALTH_ENABLED=$NEXT_PUBLIC_IS_PROJECT_HEALTH_ENABLED
          NEXT_PUBLIC_POSTHOG_HOST=$NEXT_PUBLIC_POSTHOG_HOST
          NEXT_PUBLIC_POSTHOG_KEY=$NEXT_PUBLIC_POSTHOG_KEY
          NEXT_PUBLIC_RELEASE_VERSION=$NEXT_PUBLIC_RELEASE_VERSION
          NEXT_PUBLIC_SENTRY_DSN=$NEXT_PUBLIC_SENTRY_DSN
          EOF

      - name: Get backend image size
        id: backend-size
        run: |
          IMAGE_NAME="owasp/nest:backend-staging"
          RAW_SIZE=$(docker image inspect "$IMAGE_NAME" --format='{{.Size}}')
          DISPLAY_SIZE=$(numfmt --to=iec --suffix=B "$RAW_SIZE")
          echo "human_readable=$DISPLAY_SIZE" >> $GITHUB_OUTPUT

      - name: Build frontend image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          cache-from: |
            type=gha
            type=registry,ref=owasp/nest:frontend-staging-cache
          cache-to: |
            type=registry,ref=owasp/nest:frontend-staging-cache
          context: frontend
          file: docker/frontend/Dockerfile
          load: true
          platforms: linux/amd64
          push: true
          secrets: |
            RELEASE_VERSION=${{ env.RELEASE_VERSION }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          tags: |
            owasp/nest:frontend-staging
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/nest-staging-frontend:${{ env.RELEASE_VERSION }}

      - name: Get frontend image size
        id: frontend-size
        run: |
          IMAGE_NAME="owasp/nest:frontend-staging"
          RAW_SIZE=$(docker image inspect "$IMAGE_NAME" --format='{{.Size}}')
          DISPLAY_SIZE=$(numfmt --to=iec --suffix=B "$RAW_SIZE")
          echo "human_readable=$DISPLAY_SIZE" >> $GITHUB_OUTPUT

      - name: Create Docker image size report
        run: |
          {
            echo "## Docker Image Size Report"
            echo ""
            echo "**Backend:** ${{ steps.backend-size.outputs.human_readable }}"
            echo "**Frontend:** ${{ steps.frontend-size.outputs.human_readable }}"
          } >> $GITHUB_STEP_SUMMARY
    timeout-minutes: 10

  scan-staging-images:
    name: Scan Staging Images
    needs:
      - build-staging-images
      - set-release-version
    permissions:
      contents: write
    uses: ./.github/workflows/scan-images.yaml
    with:
      backend_image_name: owasp/nest:backend-staging
      environment: staging
      frontend_image_name: owasp/nest:frontend-staging
      release_version: ${{ needs.set-release-version.outputs.release_version }}
      sbom_artifact_name: staging-sbom-${{ needs.set-release-version.outputs.release_version }}
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bootstrap-nest-staging-infrastructure:
    name: Bootstrap Nest Staging Infrastructure
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
    environment: staging
    if: |
      (github.repository == 'OWASP/Nest' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'))

    needs:
      - scan-staging-images
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.BOOTSTRAP_AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.BOOTSTRAP_AWS_SECRET_ACCESS_KEY }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4.0.0
        with:
          terraform_version: 1.14

      - name: Prepare terraform backend
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET_NAME: ${{ secrets.BOOTSTRAP_TF_STATE_BUCKET_NAME }}
        run: |
          umask 377
          cat > infrastructure/bootstrap/terraform.tfbackend <<-EOF
          bucket="$TF_STATE_BUCKET_NAME"
          region="$AWS_REGION"
          EOF

      - name: Prepare terraform variables
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          PROJECT_NAME: nest
          AWS_ROLE_EXTERNAL_ID: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
        run: |
          umask 377
          cat > infrastructure/bootstrap/terraform.tfvars <<-EOF
          aws_region="$AWS_REGION"
          project_name="$PROJECT_NAME"
          aws_role_external_id="$AWS_ROLE_EXTERNAL_ID"
          EOF

      - name: Terraform Init
        working-directory: infrastructure/bootstrap
        run: terraform init -backend-config=terraform.tfbackend

      - name: Terraform Validate
        working-directory: infrastructure/bootstrap
        run: terraform validate

      - name: Terraform Plan
        working-directory: infrastructure/bootstrap
        run: terraform plan -out=tfplan

      - name: Show plan in summary
        working-directory: infrastructure/bootstrap
        run: |
          echo "## Bootstrap Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        working-directory: infrastructure/bootstrap
        run: terraform apply -auto-approve tfplan
    timeout-minutes: 10

  deploy-staging-nest:
    name: Plan and Deploy Nest Staging
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
    environment: staging
    if: |
      github.repository == 'OWASP/Nest' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs:
      - bootstrap-nest-staging-infrastructure
      - set-release-version
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-duration-seconds: 3600
          role-external-id: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
          role-session-name: GitHubActions-StagingDeploy
          role-skip-session-tagging: true
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/nest-staging-terraform

      - name: Install Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4.0.0
        with:
          terraform_version: 1.14

      - name: Prepare terraform backend
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET_NAME: ${{ secrets.TF_STATE_BUCKET_NAME }}
          TF_STATE_KEY: staging/terraform.tfstate
        run: |
          umask 377
          cat > infrastructure/live/terraform.tfbackend <<-EOF
          bucket="$TF_STATE_BUCKET_NAME"
          key="${TF_STATE_KEY}"
          region="$AWS_REGION"
          EOF

      - name: Prepare terraform variables
        env:
          AVAILABILITY_ZONES: ${{ vars.AWS_AVAILABILITY_ZONES }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          BACKEND_USE_FARGATE_SPOT: true
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          DJANGO_CONFIGURATION: Staging
          DJANGO_SETTINGS_MODULE: settings.staging
          ENABLE_CRON_TASKS: false
          ENABLE_NAT_GATEWAY: false
          ENABLE_RDS_PROXY: false
          ENVIRONMENT: staging
          FRONTEND_USE_FARGATE_SPOT: true
          PROJECT_NAME: nest
          RELEASE_VERSION: ${{ needs.set-release-version.outputs.release_version }}
          TASKS_USE_FARGATE_SPOT: true
        run: |
          umask 377
          cat > infrastructure/live/terraform.tfvars <<-EOF
          availability_zones=$AVAILABILITY_ZONES
          aws_region="$AWS_REGION"
          backend_image_tag="$RELEASE_VERSION"
          backend_use_fargate_spot=$BACKEND_USE_FARGATE_SPOT
          domain_name="$DOMAIN_NAME"
          django_configuration="$DJANGO_CONFIGURATION"
          django_release_version="$RELEASE_VERSION"
          django_settings_module="$DJANGO_SETTINGS_MODULE"
          enable_cron_tasks=$ENABLE_CRON_TASKS
          enable_nat_gateway=$ENABLE_NAT_GATEWAY
          enable_rds_proxy=$ENABLE_RDS_PROXY
          environment="$ENVIRONMENT"
          frontend_use_fargate_spot=$FRONTEND_USE_FARGATE_SPOT
          frontend_image_tag="$RELEASE_VERSION"
          project_name="$PROJECT_NAME"
          tasks_use_fargate_spot=$TASKS_USE_FARGATE_SPOT
          EOF

      - name: Terraform Init
        working-directory: infrastructure/live
        run: terraform init -backend-config=terraform.tfbackend

      - name: Terraform Validate
        working-directory: infrastructure/live
        run: terraform validate

      - name: Terraform Plan
        working-directory: infrastructure/live
        run: terraform plan -out=tfplan

      - name: Show plan in summary
        working-directory: infrastructure/live
        run: |
          echo "## Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        working-directory: infrastructure/live
        run: terraform apply -auto-approve tfplan

      - name: Capture terraform outputs
        id: tf-outputs
        working-directory: infrastructure/live
        run: |
          echo "backend_cluster_name=$(terraform output -raw backend_cluster_name)" >> $GITHUB_OUTPUT
          echo "backend_service_name=$(terraform output -raw backend_service_name)" >> $GITHUB_OUTPUT
          echo "frontend_cluster_name=$(terraform output -raw frontend_cluster_name)" >> $GITHUB_OUTPUT
          echo "frontend_service_name=$(terraform output -raw frontend_service_name)" >> $GITHUB_OUTPUT
          echo "nat_gateway_enabled=$(terraform output -raw nat_gateway_enabled)" >> $GITHUB_OUTPUT
          echo "tasks_cluster_name=$(terraform output -raw tasks_cluster_name)" >> $GITHUB_OUTPUT
          echo "tasks_security_group_id=$(terraform output -raw tasks_security_group_id)" >> $GITHUB_OUTPUT
          echo "tasks_subnet_ids=$(terraform output -json tasks_subnet_ids | jq -r 'join(",")')" >> $GITHUB_OUTPUT

      - name: Run ECS migrate task
        id: migrate-task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
          NAT_GATEWAY_ENABLED: ${{ steps.tf-outputs.outputs.nat_gateway_enabled }}
          TASKS_SECURITY_GROUP_ID: ${{ steps.tf-outputs.outputs.tasks_security_group_id }}
          TASK_DEFINITION: nest-staging-migrate
          TASKS_SUBNET_IDS: ${{ steps.tf-outputs.outputs.tasks_subnet_ids }}
        run: |
          ASSIGN_PUBLIC_IP=$([ "$NAT_GATEWAY_ENABLED" = "true" ] && echo "DISABLED" || echo "ENABLED")
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$TASKS_SUBNET_IDS],securityGroups=[$TASKS_SECURITY_GROUP_ID],assignPublicIp=$ASSIGN_PUBLIC_IP}" \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT

      - name: Wait for migrate task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
        run: |
          aws ecs wait tasks-stopped \
            --cluster "$CLUSTER_NAME" \
            --tasks "${{ steps.migrate-task.outputs.task_arn }}"

      - name: Check migrate task exit code
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
        run: |
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER_NAME" \
            --tasks "${{ steps.migrate-task.outputs.task_arn }}" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migrate task failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migrate task completed successfully"

      - name: Run ECS index-data task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
          NAT_GATEWAY_ENABLED: ${{ steps.tf-outputs.outputs.nat_gateway_enabled }}
          TASK_DEFINITION: nest-staging-index-data
          TASKS_SECURITY_GROUP_ID: ${{ steps.tf-outputs.outputs.tasks_security_group_id }}
          TASKS_SUBNET_IDS: ${{ steps.tf-outputs.outputs.tasks_subnet_ids }}
        run: |
          ASSIGN_PUBLIC_IP=$([ "$NAT_GATEWAY_ENABLED" = "true" ] && echo "DISABLED" || echo "ENABLED")
          RESPONSE=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$TASKS_SUBNET_IDS],securityGroups=[$TASKS_SECURITY_GROUP_ID],assignPublicIp=$ASSIGN_PUBLIC_IP}")

          FAILURE_COUNT=$(echo "$RESPONSE" | jq '.failures | length')
          TASK_COUNT=$(echo "$RESPONSE" | jq '.tasks | length')

          if [ "$FAILURE_COUNT" -gt 0 ]; then
            echo "Error: ECS run-task for $TASK_DEFINITION on cluster $CLUSTER_NAME returned failures:"
            echo "$RESPONSE" | jq '.failures'
            exit 1
          fi

          if [ "$TASK_COUNT" -eq 0 ]; then
            echo "Error: ECS run-task for $TASK_DEFINITION on cluster $CLUSTER_NAME returned no tasks"
            echo "$RESPONSE"
            exit 1
          fi

          echo "Index-data task started successfully (runs async, ~30 min)"

      - name: Wait for backend service stability
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.backend_cluster_name }}
          SERVICE_NAME: ${{ steps.tf-outputs.outputs.backend_service_name }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"

      - name: Wait for frontend service stability
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.frontend_cluster_name }}
          SERVICE_NAME: ${{ steps.tf-outputs.outputs.frontend_service_name }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"
    timeout-minutes: 60

  run-staging-lighthouse-ci:
    name: Run staging Lighthouse CI
    needs:
      - deploy-staging-nest
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e  # v6.0.3
        with:
          run_install: false
          version: 10.33.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          cache-dependency-path: frontend/pnpm-lock.yaml
          cache: pnpm
          node-version: 24

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Run lighthouse-ci
        env:
          LHCI_BASE_URL: https://nest.owasp.dev
        run: |
          pnpm run lighthouse-ci
        working-directory: frontend
    timeout-minutes: 5

  run-staging-zap-baseline-scan:
    name: Run staging ZAP baseline scan
    needs:
      - deploy-staging-nest
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25  # v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: https://nest.owasp.dev
          allow_issue_writing: false
          fail_action: true
          cmd_options: -a -c .zapconfig -r report_html.html

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: zap-baseline-scan-report-${{ github.run_id }}
          path: report_html.html
    timeout-minutes: 5

  build-production-images:
    name: Build Production Images
    env:
      RELEASE_VERSION: ${{ needs.set-release-version.outputs.release_version }}
    environment: production
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - set-release-version
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-duration-seconds: 3600
          role-external-id: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
          role-session-name: GitHubActions-BuildProductionImages
          role-skip-session-tagging: true
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/nest-production-terraform

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7  # v2.1.4

      - name: Build backend image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          build-args: |
            OWASP_GID=1002
            OWASP_UID=1002
          cache-from: |
            type=gha
            type=registry,ref=owasp/nest:backend-staging-cache
          context: backend
          file: docker/backend/Dockerfile
          load: true
          platforms: linux/amd64
          push: true
          tags: |
            owasp/nest:backend-production
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/nest-production-backend:${{ env.RELEASE_VERSION }}

      - name: Get backend image size
        id: backend-size
        run: |
          IMAGE_NAME="owasp/nest:backend-production"
          RAW_SIZE=$(docker image inspect "$IMAGE_NAME" --format='{{.Size}}')
          DISPLAY_SIZE=$(numfmt --to=iec --suffix=B "$RAW_SIZE")
          echo "human_readable=$DISPLAY_SIZE" >> $GITHUB_OUTPUT

      - name: Prepare frontend public environment
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.VITE_API_URL }}
          NEXT_PUBLIC_CSRF_URL: ${{ secrets.VITE_CSRF_URL }}
          NEXT_PUBLIC_ENVIRONMENT: ${{ secrets.VITE_ENVIRONMENT }}
          NEXT_PUBLIC_GRAPHQL_URL: ${{ secrets.VITE_GRAPHQL_URL }}
          NEXT_PUBLIC_GTM_ID: ${{ secrets.NEXT_PUBLIC_GTM_ID }}
          NEXT_PUBLIC_IDX_URL: ${{ secrets.VITE_IDX_URL }}
          NEXT_PUBLIC_IS_PROJECT_HEALTH_ENABLED: ${{ secrets.NEXT_PUBLIC_IS_PROJECT_HEALTH_ENABLED }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: |
          umask 377
          cat > frontend/.env <<EOF
          NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
          NEXT_PUBLIC_CSRF_URL=$NEXT_PUBLIC_CSRF_URL
          NEXT_PUBLIC_ENVIRONMENT=$NEXT_PUBLIC_ENVIRONMENT
          NEXT_PUBLIC_GRAPHQL_URL=$NEXT_PUBLIC_GRAPHQL_URL
          NEXT_PUBLIC_GTM_ID=$NEXT_PUBLIC_GTM_ID
          NEXT_PUBLIC_IDX_URL=$NEXT_PUBLIC_IDX_URL
          NEXT_PUBLIC_IS_PROJECT_HEALTH_ENABLED=$NEXT_PUBLIC_IS_PROJECT_HEALTH_ENABLED
          NEXT_PUBLIC_POSTHOG_HOST=$NEXT_PUBLIC_POSTHOG_HOST
          NEXT_PUBLIC_POSTHOG_KEY=$NEXT_PUBLIC_POSTHOG_KEY
          NEXT_PUBLIC_RELEASE_VERSION=$NEXT_PUBLIC_RELEASE_VERSION
          NEXT_PUBLIC_SENTRY_DSN=$NEXT_PUBLIC_SENTRY_DSN
          EOF

      - name: Build frontend image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          cache-from: |
            type=gha
            type=registry,ref=owasp/nest:frontend-staging-cache
          context: frontend
          file: docker/frontend/Dockerfile
          load: true
          platforms: linux/amd64
          push: true
          secrets: |
            RELEASE_VERSION=${{ env.RELEASE_VERSION }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          tags: |
            owasp/nest:frontend-production
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/nest-production-frontend:${{ env.RELEASE_VERSION }}

      - name: Get frontend image size
        id: frontend-size
        run: |
          IMAGE_NAME="owasp/nest:frontend-production"
          RAW_SIZE=$(docker image inspect "$IMAGE_NAME" --format='{{.Size}}')
          DISPLAY_SIZE=$(numfmt --to=iec --suffix=B "$RAW_SIZE")
          echo "human_readable=$DISPLAY_SIZE" >> $GITHUB_OUTPUT

      - name: Create Docker image size report
        run: |
          {
            echo "## Docker Image Size Report"
            echo ""
            echo "**Backend:** ${{ steps.backend-size.outputs.human_readable }}"
            echo "**Frontend:** ${{ steps.frontend-size.outputs.human_readable }}"
          } >> $GITHUB_STEP_SUMMARY
    timeout-minutes: 5

  scan-production-images:
    name: Scan Production Images
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - build-production-images
      - set-release-version
    env:
      RELEASE_VERSION: ${{ needs.set-release-version.outputs.release_version }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Cache Trivy DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .trivy-cache
          key: trivy-${{ runner.os }}-${{ hashFiles('docker/trivy/Dockerfile') }}
          restore-keys: trivy-${{ runner.os }}-

      - name: Run Trivy security scan via Makefile
        run: |
          make security-scan-backend-image BACKEND_IMAGE_NAME=owasp/nest:backend-production
          make security-scan-frontend-image FRONTEND_IMAGE_NAME=owasp/nest:frontend-production

      - name: Generate SBOM for backend image
        run: |
          make sbom-backend-image BACKEND_IMAGE_NAME=owasp/nest:backend-production

      - name: Generate SBOM for frontend image
        run: |
          make sbom-frontend-image FRONTEND_IMAGE_NAME=owasp/nest:frontend-production

      - name: Upload SBOMs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            backend-sbom-${{ env.RELEASE_VERSION }}.cdx.json \
            frontend-sbom-${{ env.RELEASE_VERSION }}.cdx.json
    timeout-minutes: 5

  bootstrap-nest-production-infrastructure:
    name: Bootstrap Nest Production Infrastructure
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
    environment: production
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'

    needs:
      - scan-production-images
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.BOOTSTRAP_AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.BOOTSTRAP_AWS_SECRET_ACCESS_KEY }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4.0.0
        with:
          terraform_version: 1.14

      - name: Prepare terraform backend
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET_NAME: ${{ secrets.BOOTSTRAP_TF_STATE_BUCKET_NAME }}
        run: |
          umask 377
          cat > infrastructure/bootstrap/terraform.tfbackend <<-EOF
          bucket="$TF_STATE_BUCKET_NAME"
          region="$AWS_REGION"
          EOF

      - name: Prepare terraform variables
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          PROJECT_NAME: nest
          AWS_ROLE_EXTERNAL_ID: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
        run: |
          umask 377
          cat > infrastructure/bootstrap/terraform.tfvars <<-EOF
          aws_region="$AWS_REGION"
          project_name="$PROJECT_NAME"
          aws_role_external_id="$AWS_ROLE_EXTERNAL_ID"
          EOF

      - name: Terraform Init
        working-directory: infrastructure/bootstrap
        run: terraform init -backend-config=terraform.tfbackend

      - name: Terraform Validate
        working-directory: infrastructure/bootstrap
        run: terraform validate

      - name: Terraform Plan
        working-directory: infrastructure/bootstrap
        run: terraform plan -out=tfplan

      - name: Show plan in summary
        working-directory: infrastructure/bootstrap
        run: |
          echo "## Bootstrap Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        working-directory: infrastructure/bootstrap
        run: terraform apply -auto-approve tfplan
    timeout-minutes: 10

  deploy-production-nest:
    name: Plan and Deploy Nest Production
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
    environment: production
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - bootstrap-nest-production-infrastructure
      - set-release-version
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-duration-seconds: 3600
          role-external-id: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
          role-session-name: GitHubActions-ProductionDeploy
          role-skip-session-tagging: true
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/nest-production-terraform

      - name: Install Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4.0.0
        with:
          terraform_version: 1.14

      - name: Prepare terraform backend
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET_NAME: ${{ secrets.TF_STATE_BUCKET_NAME }}
          TF_STATE_KEY: production/terraform.tfstate
        run: |
          umask 377
          cat > infrastructure/live/terraform.tfbackend <<-EOF
          bucket="$TF_STATE_BUCKET_NAME"
          key="${TF_STATE_KEY}"
          region="$AWS_REGION"
          EOF

      - name: Prepare terraform variables
        env:
          AVAILABILITY_ZONES: ${{ vars.AWS_AVAILABILITY_ZONES }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          BACKEND_USE_FARGATE_SPOT: false
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          DJANGO_CONFIGURATION: Production
          DJANGO_SETTINGS_MODULE: settings.production
          ENABLE_ADDITIONAL_PARAMETERS: true
          ENABLE_CRON_TASKS: true
          ENABLE_NAT_GATEWAY: true
          ENABLE_RDS_PROXY: true
          ENVIRONMENT: production
          FRONTEND_USE_FARGATE_SPOT: false
          PROJECT_NAME: nest
          RELEASE_VERSION: ${{ needs.set-release-version.outputs.release_version }}
          TASKS_USE_FARGATE_SPOT: false
        run: |
          umask 377
          cat > infrastructure/live/terraform.tfvars <<-EOF
          availability_zones=$AVAILABILITY_ZONES
          aws_region="$AWS_REGION"
          backend_image_tag="$RELEASE_VERSION"
          backend_use_fargate_spot=$BACKEND_USE_FARGATE_SPOT
          domain_name="$DOMAIN_NAME"
          django_configuration="$DJANGO_CONFIGURATION"
          django_release_version="$RELEASE_VERSION"
          django_settings_module="$DJANGO_SETTINGS_MODULE"
          enable_additional_parameters=$ENABLE_ADDITIONAL_PARAMETERS
          enable_cron_tasks=$ENABLE_CRON_TASKS
          enable_nat_gateway=$ENABLE_NAT_GATEWAY
          enable_rds_proxy=$ENABLE_RDS_PROXY
          environment="$ENVIRONMENT"
          frontend_use_fargate_spot=$FRONTEND_USE_FARGATE_SPOT
          frontend_image_tag="$RELEASE_VERSION"
          project_name="$PROJECT_NAME"
          tasks_use_fargate_spot=$TASKS_USE_FARGATE_SPOT
          EOF

      - name: Terraform Init
        working-directory: infrastructure/live
        run: terraform init -backend-config=terraform.tfbackend

      - name: Terraform Validate
        working-directory: infrastructure/live
        run: terraform validate

      - name: Terraform Plan
        working-directory: infrastructure/live
        run: terraform plan -out=tfplan

      - name: Show plan in summary
        working-directory: infrastructure/live
        run: |
          echo "## Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        working-directory: infrastructure/live
        run: terraform apply -auto-approve tfplan

      - name: Capture terraform outputs
        id: tf-outputs
        working-directory: infrastructure/live
        run: |
          echo "backend_cluster_name=$(terraform output -raw backend_cluster_name)" >> $GITHUB_OUTPUT
          echo "backend_service_name=$(terraform output -raw backend_service_name)" >> $GITHUB_OUTPUT
          echo "frontend_cluster_name=$(terraform output -raw frontend_cluster_name)" >> $GITHUB_OUTPUT
          echo "frontend_service_name=$(terraform output -raw frontend_service_name)" >> $GITHUB_OUTPUT
          echo "nat_gateway_enabled=$(terraform output -raw nat_gateway_enabled)" >> $GITHUB_OUTPUT
          echo "tasks_cluster_name=$(terraform output -raw tasks_cluster_name)" >> $GITHUB_OUTPUT
          echo "tasks_security_group_id=$(terraform output -raw tasks_security_group_id)" >> $GITHUB_OUTPUT
          echo "tasks_subnet_ids=$(terraform output -json tasks_subnet_ids | jq -r 'join(",")')" >> $GITHUB_OUTPUT

      - name: Run ECS migrate task
        id: migrate-task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
          NAT_GATEWAY_ENABLED: ${{ steps.tf-outputs.outputs.nat_gateway_enabled }}
          TASKS_SECURITY_GROUP_ID: ${{ steps.tf-outputs.outputs.tasks_security_group_id }}
          TASK_DEFINITION: nest-production-migrate
          TASKS_SUBNET_IDS: ${{ steps.tf-outputs.outputs.tasks_subnet_ids }}
        run: |
          ASSIGN_PUBLIC_IP=$([ "$NAT_GATEWAY_ENABLED" = "true" ] && echo "DISABLED" || echo "ENABLED")
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$TASKS_SUBNET_IDS],securityGroups=[$TASKS_SECURITY_GROUP_ID],assignPublicIp=$ASSIGN_PUBLIC_IP}" \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT

      - name: Wait for migrate task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
        run: |
          aws ecs wait tasks-stopped \
            --cluster "$CLUSTER_NAME" \
            --tasks "${{ steps.migrate-task.outputs.task_arn }}"

      - name: Check migrate task exit code
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
        run: |
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER_NAME" \
            --tasks "${{ steps.migrate-task.outputs.task_arn }}" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migrate task failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migrate task completed successfully"

      - name: Run ECS index-data task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
          NAT_GATEWAY_ENABLED: ${{ steps.tf-outputs.outputs.nat_gateway_enabled }}
          TASK_DEFINITION: nest-production-index-data
          TASKS_SECURITY_GROUP_ID: ${{ steps.tf-outputs.outputs.tasks_security_group_id }}
          TASKS_SUBNET_IDS: ${{ steps.tf-outputs.outputs.tasks_subnet_ids }}
        run: |
          ASSIGN_PUBLIC_IP=$([ "$NAT_GATEWAY_ENABLED" = "true" ] && echo "DISABLED" || echo "ENABLED")
          RESPONSE=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$TASKS_SUBNET_IDS],securityGroups=[$TASKS_SECURITY_GROUP_ID],assignPublicIp=$ASSIGN_PUBLIC_IP}")

          FAILURE_COUNT=$(echo "$RESPONSE" | jq '.failures | length')
          TASK_COUNT=$(echo "$RESPONSE" | jq '.tasks | length')

          if [ "$FAILURE_COUNT" -gt 0 ]; then
            echo "Error: ECS run-task for $TASK_DEFINITION on cluster $CLUSTER_NAME returned failures:"
            echo "$RESPONSE" | jq '.failures'
            exit 1
          fi

          if [ "$TASK_COUNT" -eq 0 ]; then
            echo "Error: ECS run-task for $TASK_DEFINITION on cluster $CLUSTER_NAME returned no tasks"
            echo "$RESPONSE"
            exit 1
          fi

          echo "Index-data task started successfully (runs async, ~30 min)"

      - name: Wait for backend service stability
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.backend_cluster_name }}
          SERVICE_NAME: ${{ steps.tf-outputs.outputs.backend_service_name }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"

      - name: Wait for frontend service stability
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.frontend_cluster_name }}
          SERVICE_NAME: ${{ steps.tf-outputs.outputs.frontend_service_name }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"

  run-production-lighthouse-ci:
    name: Run production Lighthouse CI
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - deploy-production-nest
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e  # v6.0.3
        with:
          run_install: false
          version: 10.33.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          cache-dependency-path: frontend/pnpm-lock.yaml
          cache: pnpm
          node-version: 24

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Run lighthouse-ci
        env:
          LHCI_BASE_URL: https://nest.owasp.org
        run: |
          pnpm run lighthouse-ci
        working-directory: frontend
    timeout-minutes: 5

  run-production-zap-baseline-scan:
    name: Run production ZAP baseline scan
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - deploy-production-nest
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25  # v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: https://nest.owasp.org
          allow_issue_writing: false
          fail_action: true
          cmd_options: -a -c .zapconfig -r report_html.html

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: zap-baseline-scan-report-${{ github.run_id }}
          path: report_html.html
    timeout-minutes: 5
