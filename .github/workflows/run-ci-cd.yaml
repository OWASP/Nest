name: Run CI/CD

on:
  merge_group:
  pull_request:
    branches:
      - dev
      - feature/**
      - main
  push:
    branches:
      - dev
      - feature/**
      - main

permissions: {}

env:
  FORCE_COLOR: 1

jobs:
  run-checks-and-tests:
    name: Run checks and tests
    permissions:
      actions: write
      contents: read
      id-token: write
    uses: ./.github/workflows/run-checks-and-tests.yaml
