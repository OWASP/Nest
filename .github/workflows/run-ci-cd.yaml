name: CI/CD

on:
  workflow_call:
    inputs:
      backend_gid:
        description: Backend GID for Docker build
        required: true
        type: string
      backend_uid:
        description: Backend UID for Docker build
        required: true
        type: string
      backend_use_fargate_spot:
        description: Use Fargate spot for backend
        required: true
        type: boolean
      base_url:
        description: The base URL for Lighthouse and ZAP scans
        required: true
        type: string
      django_configuration:
        description: Django configuration string
        required: true
        type: string
      django_settings_module:
        description: Django settings module
        required: true
        type: string
      enable_additional_parameters:
        description: Enable additional SSM parameters
        required: false
        default: false
        type: boolean
      enable_cron_tasks:
        description: Enable cron tasks
        required: true
        type: boolean
      enable_nat_gateway:
        description: Enable NAT gateway
        required: true
        type: boolean
      enable_rds_proxy:
        description: Enable RDS proxy
        required: true
        type: boolean
      environment:
        description: The environment name (e.g., staging, production)
        required: true
        type: string
      frontend_use_fargate_spot:
        description: Use Fargate spot for frontend
        required: true
        type: boolean
      release_tag:
        description: Release tag for uploading SBOM (Production only)
        required: false
        type: string
        default: ''
      tasks_use_fargate_spot:
        description: Use Fargate spot for tasks
        required: true
        type: boolean
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_ACCOUNT_ID:
        required: true
      AWS_ROLE_EXTERNAL_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      BOOTSTRAP_AWS_ACCESS_KEY_ID:
        required: true
      BOOTSTRAP_AWS_SECRET_ACCESS_KEY:
        required: true
      BOOTSTRAP_TF_STATE_BUCKET_NAME:
        required: true
      NEXT_PUBLIC_GTM_ID:
        required: true
      NEXT_PUBLIC_IS_PROJECT_HEALTH_ENABLED:
        required: true
      NEXT_PUBLIC_POSTHOG_HOST:
        required: true
      NEXT_PUBLIC_POSTHOG_KEY:
        required: true
      SENTRY_AUTH_TOKEN:
        required: true
      TF_STATE_BUCKET_NAME:
        required: true
      VITE_API_URL:
        required: true
      VITE_CSRF_URL:
        required: true
      VITE_ENVIRONMENT:
        required: true
      VITE_GRAPHQL_URL:
        required: true
      VITE_IDX_URL:
        required: true
      VITE_SENTRY_DSN:
        required: true

permissions: {}

env:
  FORCE_COLOR: 1

jobs:
  run-code-checks:
    name: Code checks
    permissions:
      contents: read
    uses: ./.github/workflows/run-code-checks.yaml

  run-code-tests:
    name: Code tests
    needs:
      - run-code-checks
    permissions:
      actions: write
      contents: read
      id-token: write
    uses: ./.github/workflows/run-code-tests.yaml

  run-release-version-resolution:
    name: Resolve release version
    needs:
      - run-code-tests
    permissions: {}
    uses: ./.github/workflows/run-release-version-resolution.yaml

  run-image-build:
    name: Image build
    needs:
      - run-release-version-resolution
    permissions:
      contents: read
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      AWS_ROLE_EXTERNAL_ID: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      NEXT_PUBLIC_GTM_ID: ${{ secrets.NEXT_PUBLIC_GTM_ID }}
      NEXT_PUBLIC_IS_PROJECT_HEALTH_ENABLED: ${{ secrets.NEXT_PUBLIC_IS_PROJECT_HEALTH_ENABLED }}
      NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
      NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_CSRF_URL: ${{ secrets.VITE_CSRF_URL }}
      VITE_ENVIRONMENT: ${{ secrets.VITE_ENVIRONMENT }}
      VITE_GRAPHQL_URL: ${{ secrets.VITE_GRAPHQL_URL }}
      VITE_IDX_URL: ${{ secrets.VITE_IDX_URL }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
    uses: ./.github/workflows/run-image-build.yaml
    with:
      aws_role_name: nest-${{ inputs.environment }}-terraform
      aws_role_session_name: github-actions-${{ inputs.environment }}-image-build
      backend_ecr_cache_repo: nest-${{ inputs.environment }}-backend-cache
      backend_ecr_repo: nest-${{ inputs.environment }}-backend
      backend_uid: ${{ inputs.backend_uid }}
      backend_gid: ${{ inputs.backend_gid }}
      environment: ${{ inputs.environment }}
      frontend_ecr_cache_repo: nest-${{ inputs.environment }}-frontend-cache
      frontend_ecr_repo: nest-${{ inputs.environment }}-frontend
      release_version: ${{ needs.run-release-version-resolution.outputs.release_version }}

  run-image-scan:
    name: Image scan
    needs:
      - run-image-build
      - run-release-version-resolution
    permissions:
      actions: write
      contents: write
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      AWS_ROLE_EXTERNAL_ID: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    uses: ./.github/workflows/run-image-scan.yaml
    with:
      aws_role_name: nest-${{ inputs.environment }}-terraform
      aws_role_session_name: github-actions-${{ inputs.environment }}-image-scan
      backend_ecr_repo: nest-${{ inputs.environment }}-backend
      environment: ${{ inputs.environment }}
      frontend_ecr_repo: nest-${{ inputs.environment }}-frontend
      release_tag: ${{ inputs.release_tag }}
      release_version: ${{ needs.run-release-version-resolution.outputs.release_version }}

  run-infrastructure-bootstrap:
    name: Infrastructure bootstrap
    needs:
      - run-image-scan
    permissions:
      contents: read
    secrets:
      AWS_ROLE_EXTERNAL_ID: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
      BOOTSTRAP_AWS_ACCESS_KEY_ID: ${{ secrets.BOOTSTRAP_AWS_ACCESS_KEY_ID }}
      BOOTSTRAP_AWS_SECRET_ACCESS_KEY: ${{ secrets.BOOTSTRAP_AWS_SECRET_ACCESS_KEY }}
      BOOTSTRAP_TF_STATE_BUCKET_NAME: ${{ secrets.BOOTSTRAP_TF_STATE_BUCKET_NAME }}
    uses: ./.github/workflows/run-infrastructure-bootstrap.yaml
    with:
      environment: ${{ inputs.environment }}

  run-deploy:
    name: Deploy
    needs:
      - run-infrastructure-bootstrap
      - run-release-version-resolution
    permissions:
      contents: read
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      AWS_ROLE_EXTERNAL_ID: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_STATE_BUCKET_NAME: ${{ secrets.TF_STATE_BUCKET_NAME }}
    uses: ./.github/workflows/run-deploy.yaml
    with:
      aws_role_name: nest-${{ inputs.environment }}-terraform
      aws_role_session_name: github-actions-${{ inputs.environment }}-deploy
      backend_use_fargate_spot: ${{ inputs.backend_use_fargate_spot }}
      django_configuration: ${{ inputs.django_configuration }}
      django_settings_module: ${{ inputs.django_settings_module }}
      enable_additional_parameters: ${{ inputs.enable_additional_parameters }}
      enable_cron_tasks: ${{ inputs.enable_cron_tasks }}
      enable_nat_gateway: ${{ inputs.enable_nat_gateway }}
      enable_rds_proxy: ${{ inputs.enable_rds_proxy }}
      environment: ${{ inputs.environment }}
      frontend_use_fargate_spot: ${{ inputs.frontend_use_fargate_spot }}
      index_task_definition: nest-${{ inputs.environment }}-index-data
      migrate_task_definition: nest-${{ inputs.environment }}-migrate
      release_version: ${{ needs.run-release-version-resolution.outputs.release_version }}
      tasks_use_fargate_spot: ${{ inputs.tasks_use_fargate_spot }}
      tf_state_key: ${{ inputs.environment }}/terraform.tfstate

  run-lighthouse-ci:
    name: Lighthouse CI
    needs:
      - run-deploy
    permissions:
      contents: read
    uses: ./.github/workflows/run-lighthouse-ci.yaml
    with:
      base_url: ${{ inputs.base_url }}

  run-zap-baseline-scan:
    name: ZAP baseline scan
    needs:
      - run-deploy
    permissions:
      contents: read
    uses: ./.github/workflows/run-zap-baseline-scan.yaml
    with:
      base_url: ${{ inputs.base_url }}
