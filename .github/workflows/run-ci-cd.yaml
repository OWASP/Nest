name: Run CI/CD

on:
  merge_group:
  pull_request:
    branches:
      - dev
      - feature/**
      - main
  push:
    branches:
      - dev
      - feature/**
      - main
  release:
    types:
      - published
  schedule:
    - cron: 0 2 * * *  # Run staging deploy daily at 2am UTC.
  workflow_dispatch:

permissions: {}

env:
  FORCE_COLOR: 1

jobs:
  pre-commit:
    name: Run pre-commit checks
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          cache: poetry
          cache-dependency-path: backend/poetry.lock
          python-version: '3.13'

      - name: Set up pre-commit cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85
        with:
          terraform_version: 1.14

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@dfcb455ed8d56b55edf6447a37379108181a6707
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tflint_version: v0.60.0

      - name: Run pre-commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code || (echo 'Unstaged changes detected. \
          Run `make check` and use `git add` to address it.' && exit 1)

  check-frontend:
    name: Run frontend checks
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 10
          run_install: true

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Run pnpm format
        working-directory: frontend
        run: pnpm run format

      - name: Run pnpm lint check
        working-directory: frontend
        run: pnpm run lint:check

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code || (echo 'Unstaged changes detected. \
          Run `make check` and use `git add` to address it.' && exit 1)

  spellcheck:
    name: Run spell check
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Build cspell image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          cache-from: type=gha,scope=cspell
          cache-to: type=gha,scope=cspell,mode=max
          context: cspell
          file: docker/cspell/Dockerfile
          load: true
          tags: cspell:ci

      - name: Run cspell
        run: |
          make check-spelling

  run-security-scan-code:
    name: Run code security scan
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Semgrep security scan
        run: make security-scan-code-semgrep

      - name: Cache Trivy DB
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: .trivy-cache
          key: trivy-${{ runner.os }}-${{ hashFiles('docker/trivy/Dockerfile') }}
          restore-keys: trivy-${{ runner.os }}-

      - name: Run Trivy security scan
        run: make security-scan-code-trivy SCANNERS=misconfig,secret,vuln
    timeout-minutes: 15

  run-backend-tests:
    name: Run backend tests
    needs:
      - check-frontend
      - pre-commit
      - run-security-scan-code
      - spellcheck
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Build backend test image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          cache-from: |
            type=gha
            type=registry,ref=owasp/nest:test-backend-cache
          cache-to: |
            type=gha,compression=zstd
          context: backend
          file: docker/backend/Dockerfile.test
          load: true
          platforms: linux/amd64
          tags: owasp/nest:test-backend-latest

      - name: Run backend tests
        run: |
          CONTAINER_ID=$(docker create \
            -e DJANGO_SETTINGS_MODULE=settings.test \
            --env-file backend/.env.example \
            owasp/nest:test-backend-latest pytest)
          docker start -a $CONTAINER_ID
          EXIT_CODE=$?
          docker cp $CONTAINER_ID:/home/owasp/coverage.xml backend/coverage.xml 2>/dev/null || true
          docker rm $CONTAINER_ID >/dev/null 2>&1
          exit $EXIT_CODE

      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          fail_ci_if_error: false
          files: backend/coverage.xml
          flags: backend
          use_oidc: true
    timeout-minutes: 5

  run-frontend-unit-tests:
    name: Run frontend unit tests
    needs:
      - check-frontend
      - pre-commit
      - run-security-scan-code
      - spellcheck
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Build frontend unit-testing image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          cache-from: |
            type=gha
            type=registry,ref=owasp/nest:test-frontend-unit-cache
          cache-to: |
            type=gha,compression=zstd
          context: frontend
          file: docker/frontend/Dockerfile.unit.test
          load: true
          platforms: linux/amd64
          tags: owasp/nest:test-frontend-unit-latest

      - name: Run frontend unit tests
        run: |
          CONTAINER_ID=$(docker create \
            --env-file frontend/.env.example \
            owasp/nest:test-frontend-unit-latest pnpm run test:unit)
          docker start -a $CONTAINER_ID
          EXIT_CODE=$?
          docker cp $CONTAINER_ID:/app/coverage frontend/coverage 2>/dev/null || true
          docker rm $CONTAINER_ID >/dev/null 2>&1
          exit $EXIT_CODE

      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          fail_ci_if_error: false
          files: frontend/coverage/lcov.info
          flags: frontend
          use_oidc: true
    timeout-minutes: 10

  run-frontend-e2e-tests:
    name: Run frontend e2e tests
    needs:
      - check-frontend
      - pre-commit
      - run-security-scan-code
      - spellcheck
    permissions:
      contents: read
    runs-on: ubuntu-latest
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: nest_db_e2e
          POSTGRES_PASSWORD: nest_user_e2e_password
          POSTGRES_USER: nest_user_e2e
        options: >-
          --health-cmd="pg_isready -U nest_user_e2e -d nest_db_e2e -h localhost -p 5432"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
      cache:
        image: redis:8.0.5-alpine3.21
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-retries=5
          --health-timeout=5s
        ports:
          - 6379:6379
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Setup Backend environment
        uses: ./.github/workflows/setup-backend-environment
        with:
          db_username: nest_user_e2e
          db_name: nest_db_e2e

      - name: Start Backend in the background
        run: |
          docker run -d --rm --name e2e-nest-backend \
            --env-file backend/.env.e2e.example \
            --network host \
            -e DJANGO_DB_HOST=localhost \
            -e DJANGO_REDIS_AUTH_ENABLED=False \
            -e DJANGO_REDIS_HOST=localhost \
            -p 9000:9000 \
            owasp/nest:test-backend-latest \
            sh -c '
              python manage.py migrate &&
              gunicorn wsgi:application --bind 0.0.0.0:9000
          '

      - name: Waiting for the backend to be ready
        run: |
          timeout 5m bash -c '
            until wget --spider http://localhost:9000/a; do
              echo "Waiting for the backend..."
              sleep 5
            done
          '
          echo "Backend is up!"

      - name: Load Postgres data
        env:
          PGPASSWORD: nest_user_e2e_password
        run: |
          pg_restore -h localhost -U nest_user_e2e -d nest_db_e2e < backend/data/nest.dump

      - name: Build frontend image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          build-args: |
            ENV_FILE=.env.e2e.example
            NEXT_PUBLIC_E2E_BACKEND_BASE_URL=http://localhost:9000
          cache-from: |
            type=gha
            type=registry,ref=owasp/nest:frontend-e2e-cache
          cache-to: |
            type=gha,compression=zstd
          context: frontend
          file: docker/frontend/Dockerfile
          load: true
          platforms: linux/amd64
          tags: owasp/nest:frontend-e2e-latest

      - name: Run frontend in the background
        run: |
          docker run \
            --env-file frontend/.env.e2e.example \
            --name e2e-nest-frontend \
            --network host \
            -d \
            -e NEXT_SERVER_CSRF_URL=http://localhost:9000/csrf/ \
            -e NEXT_SERVER_GRAPHQL_URL=http://localhost:9000/graphql/ \
            -p 3000:3000 \
            owasp/nest:frontend-e2e-latest

      - name: Wait for frontend to be ready
        run: |
          timeout 5m bash -c '
            until wget --spider http://localhost:3000/; do
              echo "Waiting for the frontend..."
              sleep 5
            done
          '
          echo "Frontend is up!"

      - name: Build e2e testing image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          cache-from: |
            type=gha
            type=registry,ref=owasp/nest:frontend-e2e-tests-cache
          cache-to: |
            type=gha,compression=zstd
          context: frontend
          file: docker/frontend/Dockerfile.e2e.test
          load: true
          platforms: linux/amd64
          tags: owasp/nest:test-frontend-e2e-latest

      - name: Run frontend end-to-end tests
        run: |
          docker run \
            --network host \
            -e FRONTEND_URL=http://localhost:3000 \
            owasp/nest:test-frontend-e2e-latest pnpm run test:e2e
    timeout-minutes: 20

  run-frontend-a11y-tests:
    name: Run frontend accessibility tests
    needs:
      - check-frontend
      - pre-commit
      - run-security-scan-code
      - spellcheck
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Build frontend a11y-testing image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          cache-from: |
            type=gha
            type=registry,ref=owasp/nest:test-frontend-a11y-cache
          cache-to: |
            type=gha,compression=zstd
          context: frontend
          file: docker/frontend/Dockerfile.a11y.test
          load: true
          platforms: linux/amd64
          tags: owasp/nest:test-frontend-a11y-latest

      - name: Run frontend a11y tests
        run: |
          docker run --env-file frontend/.env.example owasp/nest:test-frontend-a11y-latest pnpm run test:a11y
    timeout-minutes: 5

  run-graphql-fuzz-tests:
    name: Run GraphQL fuzz tests
    if: false
    needs:
      - check-frontend
      - pre-commit
      - run-security-scan-code
      - spellcheck
    uses: ./.github/workflows/run-fuzz-tests.yaml
    with:
      test-file: graphql_test.py

  run-rest-fuzz-tests:
    name: Run REST fuzz tests
    needs:
      - check-frontend
      - pre-commit
      - run-security-scan-code
      - spellcheck
    uses: ./.github/workflows/run-fuzz-tests.yaml
    with:
      test-file: rest_test.py
      rest-url: http://localhost:9500/api/v0

  run-infrastructure-tests:
    name: Run Infrastructure tests
    needs:
      - check-frontend
      - pre-commit
      - run-security-scan-code
      - spellcheck
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85
        with:
          terraform_version: 1.14

      - name: Run Infrastructure tests
        run: make test-infrastructure

  set-release-version:
    name: Set release version
    if: |
      github.repository == 'OWASP/Nest' &&
      (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'release' && github.event.action == 'published')
      )
    needs:
      - run-backend-tests
      - run-frontend-a11y-tests
      - run-frontend-e2e-tests
      - run-frontend-unit-tests
      - run-infrastructure-tests
      - run-rest-fuzz-tests
    outputs:
      release_version: ${{ steps.set.outputs.release_version }}
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - name: Set release version
        id: set
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "release_version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "release_version=$(date '+%y.%-m.%-d')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi
    timeout-minutes: 5

  build-staging-images:
    name: Build Staging Images
    env:
      RELEASE_VERSION: ${{ needs.set-release-version.outputs.release_version }}
    environment: staging
    if: |
      github.repository == 'OWASP/Nest' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs:
      - set-release-version
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-duration-seconds: 3600
          role-external-id: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
          role-session-name: GitHubActions-BuildStagingImages
          role-skip-session-tagging: true
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/nest-staging-terraform

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78

      - name: Build backend image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          build-args: |
            OWASP_GID=1001
            OWASP_UID=1001
          cache-from: |
            type=gha
            type=registry,ref=owasp/nest:backend-staging-cache
          cache-to: |
            type=registry,ref=owasp/nest:backend-staging-cache
          context: backend
          file: docker/backend/Dockerfile
          load: true
          platforms: linux/amd64
          push: true
          tags: |
            owasp/nest:backend-staging
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/nest-staging-backend:${{ env.RELEASE_VERSION }}

      - name: Prepare frontend public environment
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.VITE_API_URL }}
          NEXT_PUBLIC_CSRF_URL: ${{ secrets.VITE_CSRF_URL }}
          NEXT_PUBLIC_ENVIRONMENT: ${{ secrets.VITE_ENVIRONMENT }}
          NEXT_PUBLIC_GRAPHQL_URL: ${{ secrets.VITE_GRAPHQL_URL }}
          NEXT_PUBLIC_GTM_ID: ${{ secrets.NEXT_PUBLIC_GTM_ID }}
          NEXT_PUBLIC_IDX_URL: ${{ secrets.VITE_IDX_URL }}
          NEXT_PUBLIC_IS_PROJECT_HEALTH_ENABLED: ${{ secrets.NEXT_PUBLIC_IS_PROJECT_HEALTH_ENABLED }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: |
          umask 377
          cat > frontend/.env <<EOF
          NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
          NEXT_PUBLIC_CSRF_URL=$NEXT_PUBLIC_CSRF_URL
          NEXT_PUBLIC_ENVIRONMENT=$NEXT_PUBLIC_ENVIRONMENT
          NEXT_PUBLIC_GRAPHQL_URL=$NEXT_PUBLIC_GRAPHQL_URL
          NEXT_PUBLIC_GTM_ID=$NEXT_PUBLIC_GTM_ID
          NEXT_PUBLIC_IDX_URL=$NEXT_PUBLIC_IDX_URL
          NEXT_PUBLIC_IS_PROJECT_HEALTH_ENABLED=$NEXT_PUBLIC_IS_PROJECT_HEALTH_ENABLED
          NEXT_PUBLIC_POSTHOG_HOST=$NEXT_PUBLIC_POSTHOG_HOST
          NEXT_PUBLIC_POSTHOG_KEY=$NEXT_PUBLIC_POSTHOG_KEY
          NEXT_PUBLIC_RELEASE_VERSION=$NEXT_PUBLIC_RELEASE_VERSION
          NEXT_PUBLIC_SENTRY_DSN=$NEXT_PUBLIC_SENTRY_DSN
          EOF

      - name: Get backend image size
        id: backend-size
        run: |
          IMAGE_NAME="owasp/nest:backend-staging"
          RAW_SIZE=$(docker image inspect "$IMAGE_NAME" --format='{{.Size}}')
          DISPLAY_SIZE=$(numfmt --to=iec --suffix=B "$RAW_SIZE")
          echo "human_readable=$DISPLAY_SIZE" >> $GITHUB_OUTPUT

      - name: Build frontend image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          cache-from: |
            type=gha
            type=registry,ref=owasp/nest:frontend-staging-cache
          cache-to: |
            type=registry,ref=owasp/nest:frontend-staging-cache
          context: frontend
          file: docker/frontend/Dockerfile
          load: true
          platforms: linux/amd64
          push: true
          secrets: |
            RELEASE_VERSION=${{ env.RELEASE_VERSION }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          tags: |
            owasp/nest:frontend-staging
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/nest-staging-frontend:${{ env.RELEASE_VERSION }}

      - name: Get frontend image size
        id: frontend-size
        run: |
          IMAGE_NAME="owasp/nest:frontend-staging"
          RAW_SIZE=$(docker image inspect "$IMAGE_NAME" --format='{{.Size}}')
          DISPLAY_SIZE=$(numfmt --to=iec --suffix=B "$RAW_SIZE")
          echo "human_readable=$DISPLAY_SIZE" >> $GITHUB_OUTPUT

      - name: Create Docker image size report
        run: |
          {
            echo "## Docker Image Size Report"
            echo ""
            echo "**Backend:** ${{ steps.backend-size.outputs.human_readable }}"
            echo "**Frontend:** ${{ steps.frontend-size.outputs.human_readable }}"
          } >> $GITHUB_STEP_SUMMARY
    timeout-minutes: 10

  scan-staging-images:
    name: Scan Staging Images
    needs:
      - build-staging-images
      - set-release-version
    env:
      RELEASE_VERSION: ${{ needs.set-release-version.outputs.release_version }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Cache Trivy DB
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: .trivy-cache
          key: trivy-${{ runner.os }}-${{ hashFiles('docker/trivy/Dockerfile') }}
          restore-keys: trivy-${{ runner.os }}-

      - name: Run Trivy security scan via Makefile
        run: |
          make security-scan-backend-image BACKEND_IMAGE_NAME=owasp/nest:backend-staging
          make security-scan-frontend-image FRONTEND_IMAGE_NAME=owasp/nest:frontend-staging

      - name: Generate SBOM for backend image
        run: |
          make sbom-backend-image BACKEND_IMAGE_NAME=owasp/nest:backend-staging

      - name: Generate SBOM for frontend image
        run: |
          make sbom-frontend-image FRONTEND_IMAGE_NAME=owasp/nest:frontend-staging

      - name: Upload SBOMs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: staging-sbom-${{ env.RELEASE_VERSION }}
          path: |
            backend-sbom-${{ env.RELEASE_VERSION }}.cdx.json
            frontend-sbom-${{ env.RELEASE_VERSION }}.cdx.json
    timeout-minutes: 5

  bootstrap-nest-staging-infrastructure:
    name: Bootstrap Nest Staging Infrastructure
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
    environment: staging
    if: |
      (github.repository == 'OWASP/Nest' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'))

    needs:
      - scan-staging-images
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
        with:
          aws-access-key-id: ${{ secrets.BOOTSTRAP_AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.BOOTSTRAP_AWS_SECRET_ACCESS_KEY }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85
        with:
          terraform_version: 1.14

      - name: Prepare terraform backend
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET_NAME: ${{ secrets.BOOTSTRAP_TF_STATE_BUCKET_NAME }}
        run: |
          umask 377
          cat > infrastructure/bootstrap/terraform.tfbackend <<-EOF
          bucket="$TF_STATE_BUCKET_NAME"
          region="$AWS_REGION"
          EOF

      - name: Prepare terraform variables
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          PROJECT_NAME: nest
          AWS_ROLE_EXTERNAL_ID: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
        run: |
          umask 377
          cat > infrastructure/bootstrap/terraform.tfvars <<-EOF
          aws_region="$AWS_REGION"
          project_name="$PROJECT_NAME"
          aws_role_external_id="$AWS_ROLE_EXTERNAL_ID"
          EOF

      - name: Terraform Init
        working-directory: infrastructure/bootstrap
        run: terraform init -backend-config=terraform.tfbackend

      - name: Terraform Validate
        working-directory: infrastructure/bootstrap
        run: terraform validate

      - name: Terraform Plan
        working-directory: infrastructure/bootstrap
        run: terraform plan -out=tfplan

      - name: Show plan in summary
        working-directory: infrastructure/bootstrap
        run: |
          echo "## Bootstrap Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        working-directory: infrastructure/bootstrap
        run: terraform apply -auto-approve tfplan
    timeout-minutes: 10

  deploy-staging-nest:
    name: Plan and Deploy Nest Staging
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
    environment: staging
    if: |
      github.repository == 'OWASP/Nest' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs:
      - bootstrap-nest-staging-infrastructure
      - set-release-version
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-duration-seconds: 3600
          role-external-id: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
          role-session-name: GitHubActions-StagingDeploy
          role-skip-session-tagging: true
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/nest-staging-terraform

      - name: Install Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85
        with:
          terraform_version: 1.14

      - name: Prepare terraform backend
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET_NAME: ${{ secrets.TF_STATE_BUCKET_NAME }}
          TF_STATE_KEY: staging/terraform.tfstate
        run: |
          umask 377
          cat > infrastructure/live/terraform.tfbackend <<-EOF
          bucket="$TF_STATE_BUCKET_NAME"
          key="${TF_STATE_KEY}"
          region="$AWS_REGION"
          EOF

      - name: Prepare terraform variables
        env:
          AVAILABILITY_ZONES: ${{ vars.AWS_AVAILABILITY_ZONES }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          BACKEND_USE_FARGATE_SPOT: true
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          DJANGO_CONFIGURATION: Staging
          DJANGO_SETTINGS_MODULE: settings.staging
          ENABLE_CRON_TASKS: false
          ENABLE_NAT_GATEWAY: false
          ENABLE_RDS_PROXY: false
          ENVIRONMENT: staging
          FRONTEND_USE_FARGATE_SPOT: true
          PROJECT_NAME: nest
          RELEASE_VERSION: ${{ needs.set-release-version.outputs.release_version }}
          TASKS_USE_FARGATE_SPOT: true
        run: |
          umask 377
          cat > infrastructure/live/terraform.tfvars <<-EOF
          availability_zones=$AVAILABILITY_ZONES
          aws_region="$AWS_REGION"
          backend_image_tag="$RELEASE_VERSION"
          backend_use_fargate_spot=$BACKEND_USE_FARGATE_SPOT
          domain_name="$DOMAIN_NAME"
          django_configuration="$DJANGO_CONFIGURATION"
          django_release_version="$RELEASE_VERSION"
          django_settings_module="$DJANGO_SETTINGS_MODULE"
          enable_cron_tasks=$ENABLE_CRON_TASKS
          enable_nat_gateway=$ENABLE_NAT_GATEWAY
          enable_rds_proxy=$ENABLE_RDS_PROXY
          environment="$ENVIRONMENT"
          frontend_use_fargate_spot=$FRONTEND_USE_FARGATE_SPOT
          frontend_image_tag="$RELEASE_VERSION"
          project_name="$PROJECT_NAME"
          tasks_use_fargate_spot=$TASKS_USE_FARGATE_SPOT
          EOF

      - name: Terraform Init
        working-directory: infrastructure/live
        run: terraform init -backend-config=terraform.tfbackend

      - name: Terraform Validate
        working-directory: infrastructure/live
        run: terraform validate

      - name: Terraform Plan
        working-directory: infrastructure/live
        run: terraform plan -out=tfplan

      - name: Show plan in summary
        working-directory: infrastructure/live
        run: |
          echo "## Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        working-directory: infrastructure/live
        run: terraform apply -auto-approve tfplan

      - name: Capture terraform outputs
        id: tf-outputs
        working-directory: infrastructure/live
        run: |
          echo "backend_cluster_name=$(terraform output -raw backend_cluster_name)" >> $GITHUB_OUTPUT
          echo "backend_service_name=$(terraform output -raw backend_service_name)" >> $GITHUB_OUTPUT
          echo "frontend_cluster_name=$(terraform output -raw frontend_cluster_name)" >> $GITHUB_OUTPUT
          echo "frontend_service_name=$(terraform output -raw frontend_service_name)" >> $GITHUB_OUTPUT
          echo "nat_gateway_enabled=$(terraform output -raw nat_gateway_enabled)" >> $GITHUB_OUTPUT
          echo "tasks_cluster_name=$(terraform output -raw tasks_cluster_name)" >> $GITHUB_OUTPUT
          echo "tasks_security_group_id=$(terraform output -raw tasks_security_group_id)" >> $GITHUB_OUTPUT
          echo "tasks_subnet_ids=$(terraform output -json tasks_subnet_ids | jq -r 'join(",")')" >> $GITHUB_OUTPUT

      - name: Run ECS migrate task
        id: migrate-task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
          NAT_GATEWAY_ENABLED: ${{ steps.tf-outputs.outputs.nat_gateway_enabled }}
          TASKS_SECURITY_GROUP_ID: ${{ steps.tf-outputs.outputs.tasks_security_group_id }}
          TASK_DEFINITION: nest-staging-migrate
          TASKS_SUBNET_IDS: ${{ steps.tf-outputs.outputs.tasks_subnet_ids }}
        run: |
          ASSIGN_PUBLIC_IP=$([ "$NAT_GATEWAY_ENABLED" = "true" ] && echo "DISABLED" || echo "ENABLED")
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$TASKS_SUBNET_IDS],securityGroups=[$TASKS_SECURITY_GROUP_ID],assignPublicIp=$ASSIGN_PUBLIC_IP}" \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT

      - name: Wait for migrate task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
        run: |
          aws ecs wait tasks-stopped \
            --cluster "$CLUSTER_NAME" \
            --tasks "${{ steps.migrate-task.outputs.task_arn }}"

      - name: Check migrate task exit code
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
        run: |
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER_NAME" \
            --tasks "${{ steps.migrate-task.outputs.task_arn }}" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migrate task failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migrate task completed successfully"

      - name: Run ECS index-data task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
          NAT_GATEWAY_ENABLED: ${{ steps.tf-outputs.outputs.nat_gateway_enabled }}
          TASK_DEFINITION: nest-staging-index-data
          TASKS_SECURITY_GROUP_ID: ${{ steps.tf-outputs.outputs.tasks_security_group_id }}
          TASKS_SUBNET_IDS: ${{ steps.tf-outputs.outputs.tasks_subnet_ids }}
        run: |
          ASSIGN_PUBLIC_IP=$([ "$NAT_GATEWAY_ENABLED" = "true" ] && echo "DISABLED" || echo "ENABLED")
          RESPONSE=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$TASKS_SUBNET_IDS],securityGroups=[$TASKS_SECURITY_GROUP_ID],assignPublicIp=$ASSIGN_PUBLIC_IP}")

          FAILURE_COUNT=$(echo "$RESPONSE" | jq '.failures | length')
          TASK_COUNT=$(echo "$RESPONSE" | jq '.tasks | length')

          if [ "$FAILURE_COUNT" -gt 0 ]; then
            echo "Error: ECS run-task for $TASK_DEFINITION on cluster $CLUSTER_NAME returned failures:"
            echo "$RESPONSE" | jq '.failures'
            exit 1
          fi

          if [ "$TASK_COUNT" -eq 0 ]; then
            echo "Error: ECS run-task for $TASK_DEFINITION on cluster $CLUSTER_NAME returned no tasks"
            echo "$RESPONSE"
            exit 1
          fi

          echo "Index-data task started successfully (runs async, ~30 min)"

      - name: Wait for backend service stability
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.backend_cluster_name }}
          SERVICE_NAME: ${{ steps.tf-outputs.outputs.backend_service_name }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"

      - name: Wait for frontend service stability
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.frontend_cluster_name }}
          SERVICE_NAME: ${{ steps.tf-outputs.outputs.frontend_service_name }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"
    timeout-minutes: 60

  run-staging-lighthouse-ci:
    name: Run staging Lighthouse CI
    needs:
      - deploy-staging-nest
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          run_install: true
          version: 10

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          cache-dependency-path: frontend/pnpm-lock.yaml
          cache: pnpm
          node-version: 24

      - name: Run lighthouse-ci
        env:
          LHCI_BASE_URL: https://nest.owasp.dev
        run: |
          pnpm run lighthouse-ci
        working-directory: frontend
    timeout-minutes: 5

  run-staging-zap-baseline-scan:
    name: Run staging ZAP baseline scan
    needs:
      - deploy-staging-nest
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: https://nest.owasp.dev
          allow_issue_writing: false
          fail_action: true
          cmd_options: -a -c .zapconfig -r report_html.html

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: zap-baseline-scan-report-${{ github.run_id }}
          path: report_html.html
    timeout-minutes: 5

  build-production-images:
    name: Build Production Images
    env:
      RELEASE_VERSION: ${{ needs.set-release-version.outputs.release_version }}
    environment: production
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - set-release-version
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-duration-seconds: 3600
          role-external-id: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
          role-session-name: GitHubActions-BuildProductionImages
          role-skip-session-tagging: true
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/nest-production-terraform

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78

      - name: Build backend image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          build-args: |
            OWASP_GID=1002
            OWASP_UID=1002
          cache-from: |
            type=gha
            type=registry,ref=owasp/nest:backend-staging-cache
          context: backend
          file: docker/backend/Dockerfile
          load: true
          platforms: linux/amd64
          push: true
          tags: |
            owasp/nest:backend-production
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/nest-production-backend:${{ env.RELEASE_VERSION }}

      - name: Get backend image size
        id: backend-size
        run: |
          IMAGE_NAME="owasp/nest:backend-production"
          RAW_SIZE=$(docker image inspect "$IMAGE_NAME" --format='{{.Size}}')
          DISPLAY_SIZE=$(numfmt --to=iec --suffix=B "$RAW_SIZE")
          echo "human_readable=$DISPLAY_SIZE" >> $GITHUB_OUTPUT

      - name: Prepare frontend public environment
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.VITE_API_URL }}
          NEXT_PUBLIC_CSRF_URL: ${{ secrets.VITE_CSRF_URL }}
          NEXT_PUBLIC_ENVIRONMENT: ${{ secrets.VITE_ENVIRONMENT }}
          NEXT_PUBLIC_GRAPHQL_URL: ${{ secrets.VITE_GRAPHQL_URL }}
          NEXT_PUBLIC_GTM_ID: ${{ secrets.NEXT_PUBLIC_GTM_ID }}
          NEXT_PUBLIC_IDX_URL: ${{ secrets.VITE_IDX_URL }}
          NEXT_PUBLIC_IS_PROJECT_HEALTH_ENABLED: ${{ secrets.NEXT_PUBLIC_IS_PROJECT_HEALTH_ENABLED }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: |
          umask 377
          cat > frontend/.env <<EOF
          NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
          NEXT_PUBLIC_CSRF_URL=$NEXT_PUBLIC_CSRF_URL
          NEXT_PUBLIC_ENVIRONMENT=$NEXT_PUBLIC_ENVIRONMENT
          NEXT_PUBLIC_GRAPHQL_URL=$NEXT_PUBLIC_GRAPHQL_URL
          NEXT_PUBLIC_GTM_ID=$NEXT_PUBLIC_GTM_ID
          NEXT_PUBLIC_IDX_URL=$NEXT_PUBLIC_IDX_URL
          NEXT_PUBLIC_IS_PROJECT_HEALTH_ENABLED=$NEXT_PUBLIC_IS_PROJECT_HEALTH_ENABLED
          NEXT_PUBLIC_POSTHOG_HOST=$NEXT_PUBLIC_POSTHOG_HOST
          NEXT_PUBLIC_POSTHOG_KEY=$NEXT_PUBLIC_POSTHOG_KEY
          NEXT_PUBLIC_RELEASE_VERSION=$NEXT_PUBLIC_RELEASE_VERSION
          NEXT_PUBLIC_SENTRY_DSN=$NEXT_PUBLIC_SENTRY_DSN
          EOF

      - name: Build frontend image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          cache-from: |
            type=gha
            type=registry,ref=owasp/nest:frontend-staging-cache
          context: frontend
          file: docker/frontend/Dockerfile
          load: true
          platforms: linux/amd64
          push: true
          secrets: |
            RELEASE_VERSION=${{ env.RELEASE_VERSION }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          tags: |
            owasp/nest:frontend-production
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/nest-production-frontend:${{ env.RELEASE_VERSION }}

      - name: Get frontend image size
        id: frontend-size
        run: |
          IMAGE_NAME="owasp/nest:frontend-production"
          RAW_SIZE=$(docker image inspect "$IMAGE_NAME" --format='{{.Size}}')
          DISPLAY_SIZE=$(numfmt --to=iec --suffix=B "$RAW_SIZE")
          echo "human_readable=$DISPLAY_SIZE" >> $GITHUB_OUTPUT

      - name: Create Docker image size report
        run: |
          {
            echo "## Docker Image Size Report"
            echo ""
            echo "**Backend:** ${{ steps.backend-size.outputs.human_readable }}"
            echo "**Frontend:** ${{ steps.frontend-size.outputs.human_readable }}"
          } >> $GITHUB_STEP_SUMMARY
    timeout-minutes: 5

  scan-production-images:
    name: Scan Production Images
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - build-production-images
      - set-release-version
    env:
      RELEASE_VERSION: ${{ needs.set-release-version.outputs.release_version }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Cache Trivy DB
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: .trivy-cache
          key: trivy-${{ runner.os }}-${{ hashFiles('docker/trivy/Dockerfile') }}
          restore-keys: trivy-${{ runner.os }}-

      - name: Run Trivy security scan via Makefile
        run: |
          make security-scan-backend-image BACKEND_IMAGE_NAME=owasp/nest:backend-production
          make security-scan-frontend-image FRONTEND_IMAGE_NAME=owasp/nest:frontend-production

      - name: Generate SBOM for backend image
        run: |
          make sbom-backend-image BACKEND_IMAGE_NAME=owasp/nest:backend-production

      - name: Generate SBOM for frontend image
        run: |
          make sbom-frontend-image FRONTEND_IMAGE_NAME=owasp/nest:frontend-production

      - name: Upload SBOMs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            backend-sbom-${{ env.RELEASE_VERSION }}.cdx.json \
            frontend-sbom-${{ env.RELEASE_VERSION }}.cdx.json
    timeout-minutes: 5

  bootstrap-nest-production-infrastructure:
    name: Bootstrap Nest Production Infrastructure
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
    environment: production
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'

    needs:
      - scan-production-images
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
        with:
          aws-access-key-id: ${{ secrets.BOOTSTRAP_AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.BOOTSTRAP_AWS_SECRET_ACCESS_KEY }}

      - name: Install Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85
        with:
          terraform_version: 1.14

      - name: Prepare terraform backend
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET_NAME: ${{ secrets.BOOTSTRAP_TF_STATE_BUCKET_NAME }}
        run: |
          umask 377
          cat > infrastructure/bootstrap/terraform.tfbackend <<-EOF
          bucket="$TF_STATE_BUCKET_NAME"
          region="$AWS_REGION"
          EOF

      - name: Prepare terraform variables
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          PROJECT_NAME: nest
          AWS_ROLE_EXTERNAL_ID: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
        run: |
          umask 377
          cat > infrastructure/bootstrap/terraform.tfvars <<-EOF
          aws_region="$AWS_REGION"
          project_name="$PROJECT_NAME"
          aws_role_external_id="$AWS_ROLE_EXTERNAL_ID"
          EOF

      - name: Terraform Init
        working-directory: infrastructure/bootstrap
        run: terraform init -backend-config=terraform.tfbackend

      - name: Terraform Validate
        working-directory: infrastructure/bootstrap
        run: terraform validate

      - name: Terraform Plan
        working-directory: infrastructure/bootstrap
        run: terraform plan -out=tfplan

      - name: Show plan in summary
        working-directory: infrastructure/bootstrap
        run: |
          echo "## Bootstrap Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        working-directory: infrastructure/bootstrap
        run: terraform apply -auto-approve tfplan
    timeout-minutes: 10

  deploy-production-nest:
    name: Plan and Deploy Nest Production
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
    environment: production
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - bootstrap-nest-production-infrastructure
      - set-release-version
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-duration-seconds: 3600
          role-external-id: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
          role-session-name: GitHubActions-ProductionDeploy
          role-skip-session-tagging: true
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/nest-production-terraform

      - name: Install Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85
        with:
          terraform_version: 1.14

      - name: Prepare terraform backend
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET_NAME: ${{ secrets.TF_STATE_BUCKET_NAME }}
          TF_STATE_KEY: production/terraform.tfstate
        run: |
          umask 377
          cat > infrastructure/live/terraform.tfbackend <<-EOF
          bucket="$TF_STATE_BUCKET_NAME"
          key="${TF_STATE_KEY}"
          region="$AWS_REGION"
          EOF

      - name: Prepare terraform variables
        env:
          AVAILABILITY_ZONES: ${{ vars.AWS_AVAILABILITY_ZONES }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          BACKEND_USE_FARGATE_SPOT: false
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          DJANGO_CONFIGURATION: Production
          DJANGO_SETTINGS_MODULE: settings.production
          ENABLE_ADDITIONAL_PARAMETERS: true
          ENABLE_CRON_TASKS: true
          ENABLE_NAT_GATEWAY: true
          ENABLE_RDS_PROXY: true
          ENVIRONMENT: production
          FRONTEND_USE_FARGATE_SPOT: false
          PROJECT_NAME: nest
          RELEASE_VERSION: ${{ needs.set-release-version.outputs.release_version }}
          TASKS_USE_FARGATE_SPOT: false
        run: |
          umask 377
          cat > infrastructure/live/terraform.tfvars <<-EOF
          availability_zones=$AVAILABILITY_ZONES
          aws_region="$AWS_REGION"
          backend_image_tag="$RELEASE_VERSION"
          backend_use_fargate_spot=$BACKEND_USE_FARGATE_SPOT
          domain_name="$DOMAIN_NAME"
          django_configuration="$DJANGO_CONFIGURATION"
          django_release_version="$RELEASE_VERSION"
          django_settings_module="$DJANGO_SETTINGS_MODULE"
          enable_additional_parameters=$ENABLE_ADDITIONAL_PARAMETERS
          enable_cron_tasks=$ENABLE_CRON_TASKS
          enable_nat_gateway=$ENABLE_NAT_GATEWAY
          enable_rds_proxy=$ENABLE_RDS_PROXY
          environment="$ENVIRONMENT"
          frontend_use_fargate_spot=$FRONTEND_USE_FARGATE_SPOT
          frontend_image_tag="$RELEASE_VERSION"
          project_name="$PROJECT_NAME"
          tasks_use_fargate_spot=$TASKS_USE_FARGATE_SPOT
          EOF

      - name: Terraform Init
        working-directory: infrastructure/live
        run: terraform init -backend-config=terraform.tfbackend

      - name: Terraform Validate
        working-directory: infrastructure/live
        run: terraform validate

      - name: Terraform Plan
        working-directory: infrastructure/live
        run: terraform plan -out=tfplan

      - name: Show plan in summary
        working-directory: infrastructure/live
        run: |
          echo "## Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Terraform Apply
        working-directory: infrastructure/live
        run: terraform apply -auto-approve tfplan

      - name: Capture terraform outputs
        id: tf-outputs
        working-directory: infrastructure/live
        run: |
          echo "backend_cluster_name=$(terraform output -raw backend_cluster_name)" >> $GITHUB_OUTPUT
          echo "backend_service_name=$(terraform output -raw backend_service_name)" >> $GITHUB_OUTPUT
          echo "frontend_cluster_name=$(terraform output -raw frontend_cluster_name)" >> $GITHUB_OUTPUT
          echo "frontend_service_name=$(terraform output -raw frontend_service_name)" >> $GITHUB_OUTPUT
          echo "nat_gateway_enabled=$(terraform output -raw nat_gateway_enabled)" >> $GITHUB_OUTPUT
          echo "tasks_cluster_name=$(terraform output -raw tasks_cluster_name)" >> $GITHUB_OUTPUT
          echo "tasks_security_group_id=$(terraform output -raw tasks_security_group_id)" >> $GITHUB_OUTPUT
          echo "tasks_subnet_ids=$(terraform output -json tasks_subnet_ids | jq -r 'join(",")')" >> $GITHUB_OUTPUT

      - name: Run ECS migrate task
        id: migrate-task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
          NAT_GATEWAY_ENABLED: ${{ steps.tf-outputs.outputs.nat_gateway_enabled }}
          TASKS_SECURITY_GROUP_ID: ${{ steps.tf-outputs.outputs.tasks_security_group_id }}
          TASK_DEFINITION: nest-production-migrate
          TASKS_SUBNET_IDS: ${{ steps.tf-outputs.outputs.tasks_subnet_ids }}
        run: |
          ASSIGN_PUBLIC_IP=$([ "$NAT_GATEWAY_ENABLED" = "true" ] && echo "DISABLED" || echo "ENABLED")
          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$TASKS_SUBNET_IDS],securityGroups=[$TASKS_SECURITY_GROUP_ID],assignPublicIp=$ASSIGN_PUBLIC_IP}" \
            --query 'tasks[0].taskArn' \
            --output text)
          echo "task_arn=$TASK_ARN" >> $GITHUB_OUTPUT

      - name: Wait for migrate task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
        run: |
          aws ecs wait tasks-stopped \
            --cluster "$CLUSTER_NAME" \
            --tasks "${{ steps.migrate-task.outputs.task_arn }}"

      - name: Check migrate task exit code
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
        run: |
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER_NAME" \
            --tasks "${{ steps.migrate-task.outputs.task_arn }}" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migrate task failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migrate task completed successfully"

      - name: Run ECS index-data task
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.tasks_cluster_name }}
          NAT_GATEWAY_ENABLED: ${{ steps.tf-outputs.outputs.nat_gateway_enabled }}
          TASK_DEFINITION: nest-production-index-data
          TASKS_SECURITY_GROUP_ID: ${{ steps.tf-outputs.outputs.tasks_security_group_id }}
          TASKS_SUBNET_IDS: ${{ steps.tf-outputs.outputs.tasks_subnet_ids }}
        run: |
          ASSIGN_PUBLIC_IP=$([ "$NAT_GATEWAY_ENABLED" = "true" ] && echo "DISABLED" || echo "ENABLED")
          RESPONSE=$(aws ecs run-task \
            --cluster "$CLUSTER_NAME" \
            --task-definition "$TASK_DEFINITION" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$TASKS_SUBNET_IDS],securityGroups=[$TASKS_SECURITY_GROUP_ID],assignPublicIp=$ASSIGN_PUBLIC_IP}")

          FAILURE_COUNT=$(echo "$RESPONSE" | jq '.failures | length')
          TASK_COUNT=$(echo "$RESPONSE" | jq '.tasks | length')

          if [ "$FAILURE_COUNT" -gt 0 ]; then
            echo "Error: ECS run-task for $TASK_DEFINITION on cluster $CLUSTER_NAME returned failures:"
            echo "$RESPONSE" | jq '.failures'
            exit 1
          fi

          if [ "$TASK_COUNT" -eq 0 ]; then
            echo "Error: ECS run-task for $TASK_DEFINITION on cluster $CLUSTER_NAME returned no tasks"
            echo "$RESPONSE"
            exit 1
          fi

          echo "Index-data task started successfully (runs async, ~30 min)"

      - name: Wait for backend service stability
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.backend_cluster_name }}
          SERVICE_NAME: ${{ steps.tf-outputs.outputs.backend_service_name }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"

      - name: Wait for frontend service stability
        env:
          CLUSTER_NAME: ${{ steps.tf-outputs.outputs.frontend_cluster_name }}
          SERVICE_NAME: ${{ steps.tf-outputs.outputs.frontend_service_name }}
        run: |
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"

  run-production-lighthouse-ci:
    name: Run production Lighthouse CI
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - deploy-production-nest
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          run_install: true
          version: 10

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          cache-dependency-path: frontend/pnpm-lock.yaml
          cache: pnpm
          node-version: 24

      - name: Run lighthouse-ci
        env:
          LHCI_BASE_URL: https://nest.owasp.org
        run: |
          pnpm run lighthouse-ci
        working-directory: frontend
    timeout-minutes: 5

  run-production-zap-baseline-scan:
    name: Run production ZAP baseline scan
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - deploy-production-nest
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: https://nest.owasp.org
          allow_issue_writing: false
          fail_action: true
          cmd_options: -a -c .zapconfig -r report_html.html

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: zap-baseline-scan-report-${{ github.run_id }}
          path: report_html.html
    timeout-minutes: 5
