name: Run CI/CD

on:
  merge_group:
  pull_request:
    branches:
      - dev
      - feature/**
      - main
  push:
    branches:
      - dev
      - feature/**
      - main
  release:
    types:
      - published
  schedule:
    - cron: 0 2 * * *  # Run staging deploy daily at 2am UTC.
  workflow_dispatch:

permissions: {}

env:
  FORCE_COLOR: 1

jobs:
  run-code-quality-checks:
    name: Run code quality checks
    permissions:
      contents: read
    uses: ./.github/workflows/run-code-quality-checks.yaml

  audit-dependencies:
    name: Audit dependencies
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with:
          run_install: false
          version: 11.5.1

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'

      - name: Install build dependencies
        run: python -m pip install -r backend/requirements.build.txt

      - name: Audit dependencies
        run: make audit-dependencies
    timeout-minutes: 5

  run-backend-tests:
    name: Run backend tests
    needs:
      - run-code-quality-checks
    permissions:
      actions: write
      contents: read
      id-token: write
    uses: ./.github/workflows/run-backend-tests.yaml

  run-frontend-tests:
    name: Run frontend tests
    needs:
      - run-code-quality-checks
    permissions:
      actions: read
      contents: read
      id-token: write
    uses: ./.github/workflows/run-frontend-tests.yaml

  run-e2e-tests:
    name: Run e2e tests
    needs:
      - run-code-quality-checks
    permissions:
      contents: read
    uses: ./.github/workflows/run-e2e-tests.yaml

  run-graphql-fuzz-tests:
    name: Run GraphQL fuzz tests
    if: false
    needs:
      - run-code-quality-checks
    uses: ./.github/workflows/run-fuzz-tests.yaml
    with:
      test-file: graphql_test.py

  run-rest-fuzz-tests:
    name: Run REST fuzz tests
    needs:
      - run-code-quality-checks
    uses: ./.github/workflows/run-fuzz-tests.yaml
    with:
      test-file: rest_test.py
      rest-url: http://localhost:9500/api/v0

  run-infrastructure-tests:
    name: Run Infrastructure tests
    needs:
      - run-code-quality-checks
    permissions:
      contents: read
    uses: ./.github/workflows/run-infrastructure-tests.yaml

  set-release-version:
    name: Set release version
    if: |
      github.repository == 'OWASP/Nest' &&
      (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'release' && github.event.action == 'published')
      )
    needs:
      - run-backend-tests
      - run-e2e-tests
      - run-frontend-tests
      - run-infrastructure-tests
      - run-rest-fuzz-tests
    permissions: {}
    uses: ./.github/workflows/set-release-version.yaml

  run-staging:
    name: Run staging jobs
    if: |
      github.repository == 'OWASP/Nest' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    needs:
      - set-release-version
    permissions:
      contents: write
      actions: write
    uses: ./.github/workflows/run-staging.yaml
    with:
      release_version: ${{ needs.set-release-version.outputs.release_version }}

  run-production:
    name: Run production jobs
    if: |
      github.repository == 'OWASP/Nest' &&
      github.event_name == 'release' &&
      github.event.action == 'published'
    needs:
      - set-release-version
    permissions:
      actions: write
      contents: write
    uses: ./.github/workflows/run-production.yaml
    with:
      release_tag: ${{ github.event.release.tag_name }}
      release_version: ${{ needs.set-release-version.outputs.release_version }}
