name: CI

on:
  merge_group:
  pull_request:
    branches:
      - feature/**
      - main
  push:
    branches:
      - feature/**
      - main

permissions: {}

env:
  FORCE_COLOR: 1

jobs:
  run-code-checks:
    name: Code checks
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/run-code-checks.yaml

  run-code-tests:
    name: Code tests
    needs:
      - run-code-checks
    permissions:
      actions: write
      contents: read
      id-token: write
    uses: ./.github/workflows/run-code-tests.yaml
