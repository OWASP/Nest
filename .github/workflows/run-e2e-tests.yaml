name: Run e2e tests

on:
  workflow_call:

env:
  FORCE_COLOR: 1

permissions: {}

jobs:
  run-e2e-tests:
    name: Run e2e tests
    env:
      NEXT_PUBLIC_E2E_BACKEND_BASE_URL: http://127.0.0.1:9000
      NEXT_SERVER_CSRF_URL: http://127.0.0.1:9000/csrf/
      NEXT_SERVER_GRAPHQL_URL: http://127.0.0.1:9000/graphql/
    permissions:
      contents: read
    runs-on: ubuntu-latest
    services:
      cache:
        image: redis:8.6-alpine3.23@sha256:d146f83b1e0f02fc27c26a50cee39338c736674c5959db84363e6ae3cd9e02d2
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-retries=5
          --health-timeout=5s
        ports:
          - 6379:6379
      db:
        env:
          POSTGRES_DB: nest_db_e2e
          POSTGRES_PASSWORD: nest_user_e2e_password
          POSTGRES_USER: nest_user_e2e
        image: pgvector/pgvector:pg16@sha256:b7777bdf891c085d63413b4d000eacf43ccef926b2f014163aa49dbcb4acd4c6
        options: >-
          --health-cmd="pg_isready -U nest_user_e2e -d nest_db_e2e -h localhost -p 5432"
          --health-interval=5s
          --health-retries=5
          --health-timeout=5s
        ports:
          - 5432:5432
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up backend environment
        uses: ./.github/actions/setup-backend-environment
        with:
          backend_port: 9000
          db_name: nest_db_e2e
          db_password: nest_user_e2e_password
          db_username: nest_user_e2e
          env_file: .env.e2e.example

      - name: Setup frontend environment
        uses: ./.github/actions/setup-frontend-environment

      - name: Prepare environment variables for frontend
        run: cp .env.e2e.example .env
        working-directory: frontend

      - name: Cache Next.js build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          key: next-cache-e2e-${{ runner.os }}-${{ hashFiles('frontend/next.config.ts', 'frontend/package.json', 'frontend/pnpm-lock.yaml') }}
          path: frontend/.next/cache

      - name: Build frontend
        run: pnpm run build
        working-directory: frontend

      - name: Verify E2E rewrites are baked into the build
        run: |
          set -euo pipefail
          manifest=frontend/.next/standalone/.next/routes-manifest.json
          if [ ! -f "$manifest" ]; then
            echo "Missing $manifest"
            exit 1
          fi
          if ! grep -q '127.0.0.1:9000' "$manifest"; then
            echo "E2E backend rewrites were not applied during the build."
            echo "Ensure NEXT_PUBLIC_E2E_BACKEND_BASE_URL is set when running pnpm run build."
            head -c 2000 "$manifest"
            exit 1
          fi
          echo "E2E rewrites present in routes-manifest.json"

      - name: Copy public and static folders
        run: |
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/
        working-directory: frontend

      - name: Run frontend in the background
        env:
          HOSTNAME: 0.0.0.0
          NEXT_TELEMETRY_DISABLED: 1
          NODE_ENV: production
          PORT: '3000'
        run: node server.js &
        working-directory: frontend/.next/standalone

      - name: Wait for frontend to be ready
        run: |
          timeout 5m bash -c '
            until wget --spider http://127.0.0.1:3000/; do
              echo "Waiting for the frontend..."
              sleep 5
            done
          '
          echo "Frontend is up!"

      - name: Verify backend proxy routes
        run: |
          set -euo pipefail
          check_csrf() {
            local label=$1 url=$2
            local status
            status=$(curl -sSL -o /tmp/csrf.json -w '%{http_code}' "$url")
            echo "$label HTTP $status"
            if [ "$status" != "200" ] || ! grep -q csrftoken /tmp/csrf.json; then
              echo "$label response:"
              head -c 500 /tmp/csrf.json
              exit 1
            fi
          }
          check_csrf "backend" http://127.0.0.1:9000/csrf/
          check_csrf "frontend" http://127.0.0.1:3000/csrf/
          graphql_status=$(curl -sS -o /tmp/graphql-response -w '%{http_code}' \
            -X POST http://127.0.0.1:3000/graphql/ \
            -H 'Content-Type: application/json' \
            -d '{"query":"{ __typename }"}')
          echo "frontend /graphql/ HTTP $graphql_status"
          if [ "$graphql_status" = "404" ]; then
            echo "Frontend did not proxy /graphql/ to the backend:"
            head -c 500 /tmp/graphql-response
            exit 1
          fi

      - name: Install e2e dependencies
        run: pnpm install --frozen-lockfile
        working-directory: e2e

      - name: Cache Playwright Chromium
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('e2e/package.json', 'e2e/pnpm-lock.yaml') }}
          path: ~/.cache/ms-playwright

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run frontend end-to-end tests
        run: |
          CI=true \
          FRONTEND_URL=http://127.0.0.1:3000 \
          pnpm run test:e2e
        working-directory: e2e

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: playwright-test-results
          path: e2e/test-results/
          retention-days: 7
    timeout-minutes: 30
