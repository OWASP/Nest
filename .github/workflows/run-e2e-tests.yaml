name: Run e2e tests

on:
  workflow_call:

env:
  FORCE_COLOR: 1

permissions: {}

jobs:
  run-e2e-tests:
    name: Run e2e tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: nest_db_e2e
          POSTGRES_PASSWORD: nest_user_e2e_password
          POSTGRES_USER: nest_user_e2e
        options: >-
          --health-cmd="pg_isready -U nest_user_e2e -d nest_db_e2e -h localhost -p 5432"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
      cache:
        image: redis:8.0.5-alpine3.21
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-retries=5
          --health-timeout=5s
        ports:
          - 6379:6379
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Backend environment
        uses: ./.github/actions/setup-backend-environment
        with:
          backend_port: 9000
          db_name: nest_db_e2e
          db_password: nest_user_e2e_password
          db_username: nest_user_e2e
          env_file: .env.e2e.example

      - name: Setup frontend environment
        uses: ./.github/actions/setup-frontend-environment

      - name: Prepare environment variables for frontend
        run: cp .env.e2e.example .env
        working-directory: frontend

      - name: Cache Next.js build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          key: next-cache-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml', 'frontend/package.json', 'frontend/next.config.ts', 'frontend/src/**',
            'frontend/public/**') }}
          path: frontend/.next/cache

      - name: Build frontend
        run: |
          NEXT_PUBLIC_E2E_BACKEND_BASE_URL=http://localhost:9000 \
          NEXT_SERVER_CSRF_URL=http://localhost:9000/csrf/ \
          NEXT_SERVER_GRAPHQL_URL=http://localhost:9000/graphql/ \
          pnpm run build
        working-directory: frontend

      - name: Run frontend in the background
        run: |
          HOSTNAME=0.0.0.0 \
          NEXT_SERVER_CSRF_URL=http://localhost:9000/csrf/ \
          NEXT_SERVER_GRAPHQL_URL=http://localhost:9000/graphql/ \
          NEXT_TELEMETRY_DISABLED=1 \
          NODE_ENV=production \
          PORT=3000 \
          node .next/standalone/server.js &
        working-directory: frontend

      - name: Wait for frontend to be ready
        run: |
          timeout 5m bash -c '
            until wget --spider http://localhost:3000/; do
              echo "Waiting for the frontend..."
              sleep 5
            done
          '
          echo "Frontend is up!"

      - name: Install e2e dependencies
        run: |
          pnpm install --frozen-lockfile
        working-directory: e2e

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json', 'e2e/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: e2e

      - name: Run frontend end-to-end tests
        run: |
          FRONTEND_URL=http://localhost:3000 \
          pnpm run test:e2e
        working-directory: e2e
    timeout-minutes: 20
