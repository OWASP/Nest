name: Run e2e tests

on:
  workflow_call:

jobs:
  run-e2e-tests:
    name: Run e2e tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: nest_db_e2e
          POSTGRES_PASSWORD: nest_user_e2e_password
          POSTGRES_USER: nest_user_e2e
        options: >-
          --health-cmd="pg_isready -U nest_user_e2e -d nest_db_e2e -h localhost -p 5432"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432
      cache:
        image: redis:8.0.5-alpine3.21
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-retries=5
          --health-timeout=5s
        ports:
          - 6379:6379
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Setup Backend environment
        uses: ./.github/workflows/setup-backend-environment
        with:
          backend_port: 9000
          db_name: nest_db_e2e
          db_password: nest_user_e2e_password
          db_username: nest_user_e2e
          env_file: .env.e2e.example

      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e  # v6.0.3
        with:
          version: 10.33.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
          node-version: 24

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Prepare frontend environment
        run: cp .env.e2e.example .env
        working-directory: frontend

      - name: Build frontend
        run: |
          NEXT_PUBLIC_E2E_BACKEND_BASE_URL=http://localhost:9000 \
          NEXT_SERVER_CSRF_URL=http://localhost:9000/csrf/ \
          NEXT_SERVER_GRAPHQL_URL=http://localhost:9000/graphql/ \
          pnpm run build
        working-directory: frontend

      - name: Run frontend in the background
        run: |
          NEXT_SERVER_CSRF_URL=http://localhost:9000/csrf/ \
          NEXT_SERVER_GRAPHQL_URL=http://localhost:9000/graphql/ \
          HOSTNAME=0.0.0.0 \
          PORT=3000 \
          node .next/standalone/server.js &
        working-directory: frontend

      - name: Wait for frontend to be ready
        run: |
          timeout 5m bash -c '
            until wget --spider http://localhost:3000/; do
              echo "Waiting for the frontend..."
              sleep 5
            done
          '
          echo "Frontend is up!"

      - name: Build e2e testing image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          cache-from: |
            type=gha
            type=registry,ref=owasp/nest:frontend-e2e-tests-cache
          cache-to: |
            type=gha,compression=zstd
          context: .
          file: docker/e2e/Dockerfile
          load: true
          platforms: linux/amd64
          tags: owasp/nest:test-frontend-e2e-latest

      - name: Run frontend end-to-end tests
        run: |
          docker run \
            --network host \
            -e FRONTEND_URL=http://localhost:3000 \
            owasp/nest:test-frontend-e2e-latest pnpm run test:e2e
    timeout-minutes: 20
