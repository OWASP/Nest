name: Coverage upload

on:
  workflow_call:
    inputs:
      artifact_name:
        description: Coverage artifact name
        required: true
        type: string
      artifact_path:
        description: Coverage artifact download path
        required: true
        type: string
      coverage_flags:
        description: Codecov flags
        required: false
        type: string
        default: ''
      coverage_path:
        description: Coverage report file path
        required: true
        type: string


permissions: {}

jobs:
  run-coverage-upload:
    name: Coverage upload
    permissions:
      actions: read
      contents: read
      id-token: write
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Download coverage report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_path }}

      - name: Import Codecov GPG verification key
        run: curl -sf https://uploader.codecov.io/verification.gpg | gpg --import

      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6.0.1
        with:
          fail_ci_if_error: true
          files: ${{ inputs.coverage_path }}
          flags: ${{ inputs.coverage_flags }}
          use_oidc: true
    timeout-minutes: 5
