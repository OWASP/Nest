name: Update Nest Test Images

on:
  schedule:
    - cron: 30 0 * * *
  workflow_dispatch:

permissions: {}

env:
  FORCE_COLOR: 1

jobs:
  update-nest-test-images:
    name: Update Nest test images
    if: ${{ github.repository == 'OWASP/Nest' }}
    permissions:
      actions: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Update backend test image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          cache-from: |
            type=gha
            type=registry,ref=owasp/nest:test-backend-cache
          cache-to: |
            type=gha,compression=zstd
            type=registry,ref=owasp/nest:test-backend-cache
          context: backend
          file: docker/backend/Dockerfile.unit-tests
          platforms: linux/amd64
          push: true
          tags: owasp/nest:test-backend-latest

      - name: Update frontend unit test image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          cache-from: |
            type=gha
            type=registry,ref=owasp/nest:test-frontend-unit-cache
          cache-to: |
            type=gha,compression=zstd
            type=registry,ref=owasp/nest:test-frontend-unit-cache
          context: frontend
          file: docker/frontend/Dockerfile.unit-tests
          platforms: linux/amd64
          push: true
          tags: owasp/nest:test-frontend-unit-latest

      - name: Update frontend end-to-end test image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          cache-from: |
            type=gha
            type=registry,ref=owasp/nest:test-frontend-e2e-cache
          cache-to: |
            type=gha,compression=zstd
            type=registry,ref=owasp/nest:test-frontend-e2e-cache
          context: .
          file: docker/e2e/Dockerfile
          platforms: linux/amd64
          push: true
          tags: owasp/nest:test-frontend-e2e-latest

      - name: Build and push fuzz-test-backend image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          cache-from: type=registry,ref=owasp/nest:test-fuzz-backend-cache
          cache-to: |
            type=gha,compression=zstd
            type=registry,ref=owasp/nest:test-fuzz-backend-cache
          context: backend
          file: docker/backend/Dockerfile.fuzz-tests
          platforms: linux/amd64
          push: true
          tags: owasp/nest:test-fuzz-backend-latest
    timeout-minutes: 15
