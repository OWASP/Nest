name: Run production jobs

on:
  workflow_call:
    inputs:
      release_tag:
        description: The release tag to set
        required: true
        type: string
      release_version:
        description: The release version to set
        required: true
        type: string

permissions: {}

env:
  FORCE_COLOR: 1

jobs:
  build-images:
    name: Build images
    permissions:
      contents: read
    uses: ./.github/workflows/build-images.yaml
    with:
      aws_role_name: nest-production-terraform
      aws_role_session_name: GitHubActions-BuildProductionImages
      backend_ecr_cache_repo: nest-production-backend-cache
      backend_ecr_repo: nest-production-backend
      backend_uid: '1002'
      backend_gid: '1002'
      environment: production
      frontend_ecr_cache_repo: nest-production-frontend-cache
      frontend_ecr_repo: nest-production-frontend
      release_version: ${{ inputs.release_version }}

  scan-images:
    name: Scan images
    needs:
      - build-images
    permissions:
      actions: write
      contents: write
    uses: ./.github/workflows/scan-images.yaml
    with:
      aws_role_name: nest-production-terraform
      aws_role_session_name: GitHubActions-ScanProductionImages
      backend_ecr_repo: nest-production-backend
      environment: production
      frontend_ecr_repo: nest-production-frontend
      release_tag: ${{ inputs.release_tag }}
      release_version: ${{ inputs.release_version }}

  bootstrap-nest-infrastructure:
    name: Bootstrap Nest infrastructure
    needs:
      - scan-images
    permissions:
      contents: read
    uses: ./.github/workflows/bootstrap-infrastructure.yaml
    with:
      environment: production

  deploy-nest:
    name: Deploy Nest
    needs:
      - bootstrap-nest-infrastructure
    permissions:
      contents: read
    uses: ./.github/workflows/deploy-nest.yaml
    with:
      aws_role_name: nest-production-terraform
      aws_role_session_name: GitHubActions-ProductionDeploy
      backend_use_fargate_spot: false
      django_configuration: Production
      django_settings_module: settings.production
      enable_additional_parameters: true
      enable_cron_tasks: true
      enable_nat_gateway: true
      enable_rds_proxy: true
      environment: production
      frontend_use_fargate_spot: false
      index_task_definition: nest-production-index-data
      migrate_task_definition: nest-production-migrate
      release_version: ${{ inputs.release_version }}
      tasks_use_fargate_spot: false
      tf_state_key: production/terraform.tfstate

  run-lighthouse-ci:
    name: Run Lighthouse CI
    needs:
      - deploy-nest
    permissions:
      contents: read
    uses: ./.github/workflows/run-lighthouse-ci.yaml
    with:
      base_url: https://nest.owasp.org

  run-zap-baseline-scan:
    name: Run ZAP baseline scan
    needs:
      - deploy-nest
    permissions:
      contents: read
    uses: ./.github/workflows/run-zap-baseline-scan.yaml
    with:
      base_url: https://nest.owasp.org
