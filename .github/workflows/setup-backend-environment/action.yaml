name: Set up Backend environment

description: >-
  Fetches nest.dump from S3 using the same Poetry environment as local Make targets, waits for
  Postgres, installs the PostgreSQL client, and builds the backend test image.

inputs:
  db_username:
    description: Database username
    required: true
  db_name:
    description: Database name
    required: true

runs:
  using: composite
  steps:
    - name: Install Poetry
      run: pipx install poetry
      shell: bash

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        cache: poetry
        cache-dependency-path: backend/poetry.lock
        python-version: '3.13'

    - name: Cache Poetry virtual environment
      id: cache-poetry-venv
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: backend/.venv
        key: poetry-venv-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}

    - name: Install backend dependencies
      if: steps.cache-poetry-venv.outputs.cache-hit != 'true'
      run: |
        cd backend
        poetry config virtualenvs.in-project true
        poetry install --no-root --no-interaction
      shell: bash

    - name: Fetch nest.dump from S3
      run: cd backend && poetry run python -m scripts.fetch_nest_dump
      shell: bash

    - name: Wait for database to be ready
      env:
        DB_USERNAME: ${{ inputs.db_username }}
        DB_NAME: ${{ inputs.db_name }}
      run: |
        timeout 5m bash -c '
          until docker exec ${{ job.services.db.id }} pg_isready -U $DB_USERNAME -d $DB_NAME; do
            echo "Waiting for database..."
            sleep 5
          done
        '
      shell: bash

    - name: Install PostgreSQL client
      run: sudo apt-get install -y postgresql-client
      shell: bash
