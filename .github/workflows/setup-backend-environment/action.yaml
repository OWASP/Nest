name: Setup Backend environment

description: >-
  Fetches nest.dump from S3 using the same Poetry environment as local Make targets, waits for
  Postgres, installs the PostgreSQL client, starts the backend, waits for it to be ready,
  and restores the database dump.

inputs:
  db_username:
    description: Database username
    required: true
  db_name:
    description: Database name
    required: true
  db_password:
    description: Database password
    required: true
  env_file:
    description: Backend environment file
    required: true
  backend_port:
    description: Backend port to bind
    required: true

runs:
  using: composite
  steps:
    - name: Install Poetry
      run: pipx install poetry
      shell: bash

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        cache: poetry
        cache-dependency-path: backend/poetry.lock
        python-version: '3.13'

    - name: Cache Poetry virtual environment
      id: cache-poetry-venv
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: backend/.venv
        key: poetry-venv-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}

    - name: Install backend dependencies
      if: steps.cache-poetry-venv.outputs.cache-hit != 'true'
      run: |
        cd backend
        poetry config virtualenvs.in-project true
        poetry install --no-root --no-interaction
      shell: bash

    - name: Fetch nest.dump from S3
      run: cd backend && poetry run python -m scripts.fetch_nest_dump
      shell: bash

    - name: Wait for database to be ready
      env:
        DB_USERNAME: ${{ inputs.db_username }}
        DB_NAME: ${{ inputs.db_name }}
      run: |
        timeout 5m bash -c '
          until docker exec ${{ job.services.db.id }} pg_isready -U $DB_USERNAME -d $DB_NAME; do
            echo "Waiting for database..."
            sleep 5
          done
        '
      shell: bash

    - name: Install PostgreSQL client
      run: sudo apt-get install -y postgresql-client
      shell: bash

    - name: Migrate Database
      env:
        ENV_FILE: ${{ inputs.env_file }}
        BACKEND_PORT: ${{ inputs.backend_port }}
      run: |
        set -euo pipefail && set -a && source $ENV_FILE && set +a
        export DJANGO_DB_HOST=localhost
        export DJANGO_REDIS_AUTH_ENABLED=False
        export DJANGO_REDIS_HOST=localhost
        cd backend && poetry run python manage.py migrate
      shell: bash

    - name: Start Backend in the background
      env:
        ENV_FILE: ${{ inputs.env_file }}
        BACKEND_PORT: ${{ inputs.backend_port }}
      run: |
        set -euo pipefail && set -a && source $ENV_FILE && set +a
        export DJANGO_DB_HOST=localhost
        export DJANGO_REDIS_AUTH_ENABLED=False
        export DJANGO_REDIS_HOST=localhost
        cd backend && poetry run gunicorn wsgi:application --bind 0.0.0.0:$BACKEND_PORT &
      shell: bash

    - name: Waiting for the backend to be ready
      env:
        BACKEND_PORT: ${{ inputs.backend_port }}
      run: |
        timeout 5m bash -c '
          until wget --spider http://localhost:$BACKEND_PORT/a; do
            echo "Waiting for backend..."
            sleep 5
          done
        '
        echo "Backend is up!"
      shell: bash

    - name: Load Postgres data
      env:
        PGPASSWORD: ${{ inputs.db_password }}
        DB_USERNAME: ${{ inputs.db_username }}
        DB_NAME: ${{ inputs.db_name }}
      run: |
        set -euo pipefail
        if ! pg_restore -h localhost -U $DB_USERNAME -d $DB_NAME < backend/data/nest.dump; then
          echo "Data loading failed"
          exit 1
        fi
        echo "Data loading completed."
      shell: bash
