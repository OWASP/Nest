name: Image scan

on:
  workflow_call:
    inputs:
      aws_role_name:
        description: AWS role name to assume
        required: true
        type: string
      aws_role_session_name:
        description: AWS role session name
        required: true
        type: string
      backend_ecr_repo:
        description: Backend ECR repository name
        required: true
        type: string
      environment:
        description: The workflow environment to use for scanning (e.g., staging, production)
        required: true
        type: string
      frontend_ecr_repo:
        description: Frontend ECR repository name
        required: true
        type: string
      release_tag:
        description: Release tag for uploading SBOM (production only)
        required: false
        type: string
        default: ''
      release_version:
        description: The release version to set
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_ACCOUNT_ID:
        required: true
      AWS_ROLE_EXTERNAL_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

env:
  FORCE_COLOR: 1

permissions: {}

jobs:
  run-image-scan:
    name: Image scan
    environment: ${{ inputs.environment }}
    env:
      BACKEND_IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ inputs.backend_ecr_repo }}:${{ inputs.release_version
        }}
      FRONTEND_IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ inputs.frontend_ecr_repo }}:${{ inputs.release_version
        }}
      RELEASE_VERSION: ${{ inputs.release_version }}
    permissions:
      actions: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885  # v6.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-duration-seconds: 3600
          role-external-id: ${{ secrets.AWS_ROLE_EXTERNAL_ID }}
          role-session-name: ${{ inputs.aws_role_session_name }}
          role-skip-session-tagging: true
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ inputs.aws_role_name }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2.1.5

      - name: Pull container images
        run: |
          docker pull "$BACKEND_IMAGE"
          docker pull "$FRONTEND_IMAGE"

      - name: Run trivy scan
        uses: ./.github/actions/run-trivy-scan
        with:
          command: |
            make security-scan-backend-image BACKEND_IMAGE_NAME="$BACKEND_IMAGE"
            make security-scan-frontend-image FRONTEND_IMAGE_NAME="$FRONTEND_IMAGE"

      - name: Generate SBOM for backend image
        run: make sbom-backend-image BACKEND_IMAGE_NAME="$BACKEND_IMAGE"

      - name: Generate SBOM for frontend image
        run: make sbom-frontend-image FRONTEND_IMAGE_NAME="$FRONTEND_IMAGE"

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-${{ env.RELEASE_VERSION }}
          path: |
            backend-sbom-${{ env.RELEASE_VERSION }}.cdx.json
            frontend-sbom-${{ env.RELEASE_VERSION }}.cdx.json
    timeout-minutes: 10

  sign-release-sbom:
    name: SBOM sign
    if: inputs.environment == 'production'
    needs:
      - run-image-scan
    permissions:
      actions: write
      id-token: write
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ inputs.release_version }}
    steps:
      - name: Download SBOM
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: sbom-${{ env.RELEASE_VERSION }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Sign SBOM
        run: |
          backend_sbom="backend-sbom-$RELEASE_VERSION.cdx.json"
          frontend_sbom="frontend-sbom-$RELEASE_VERSION.cdx.json"

          cosign sign-blob --yes \
            --bundle "${backend_sbom}.sigstore.json" \
            "$backend_sbom"

          cosign sign-blob --yes \
            --bundle "${frontend_sbom}.sigstore.json" \
            "$frontend_sbom"

      - name: Upload signed SBOM as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: signed-sbom-${{ env.RELEASE_VERSION }}
          path: |
            backend-sbom-${{ env.RELEASE_VERSION }}.cdx.json
            backend-sbom-${{ env.RELEASE_VERSION }}.cdx.json.sigstore.json
            frontend-sbom-${{ env.RELEASE_VERSION }}.cdx.json
            frontend-sbom-${{ env.RELEASE_VERSION }}.cdx.json.sigstore.json
    timeout-minutes: 5

  upload-release-sbom:
    name: SBOM upload
    if: inputs.environment == 'production'
    needs:
      - sign-release-sbom
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ inputs.release_version }}
    steps:
      - name: Download signed SBOM
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: signed-sbom-${{ env.RELEASE_VERSION }}

      - name: Upload signed SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release upload "$RELEASE_TAG" --clobber \
            "backend-sbom-$RELEASE_VERSION.cdx.json" \
            "backend-sbom-$RELEASE_VERSION.cdx.json.sigstore.json" \
            "frontend-sbom-$RELEASE_VERSION.cdx.json" \
            "frontend-sbom-$RELEASE_VERSION.cdx.json.sigstore.json"
    timeout-minutes: 5
