name: Lighthouse CI

on:
  workflow_call:
    inputs:
      base_url:
        description: Base URL for Lighthouse CI
        required: true
        type: string

env:
  FORCE_COLOR: 1

permissions: {}

jobs:
  run-lighthouse-ci:
    name: Lighthouse CI
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Install frontend dependencies
        uses: ./.github/actions/install-frontend-dependencies

      - name: Install e2e dependencies
        run: pnpm install --frozen-lockfile
        working-directory: e2e

      - name: Cache Playwright Chromium
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          key: e2e-playwright-chromium-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('e2e/package.json', 'e2e/pnpm-lock.yaml') }}
          path: ~/.cache/ms-playwright
          restore-keys: |
            e2e-playwright-chromium-${{ runner.os }}-${{ runner.arch }}-

      - name: Install Playwright Chromium
        run: |
          npx playwright install-deps chromium
          npx playwright install chromium
        working-directory: e2e

      - name: Resolve Chromium path
        run: |
          CHROME_PATH=$(node -e 'console.log(require("@playwright/test").chromium.executablePath())')
          echo "CHROME_PATH=$CHROME_PATH" >> "$GITHUB_ENV"
        working-directory: e2e

      - name: Run lighthouse-ci
        env:
          LHCI_BASE_URL: ${{ inputs.base_url }}
        run: pnpm run lighthouse-ci
        working-directory: frontend
    timeout-minutes: 15
