name: Infrastructure bootstrap

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub environment name
        required: true
        type: string
    secrets:
      AWS_ROLE_EXTERNAL_ID:
        required: true
      BOOTSTRAP_AWS_ACCESS_KEY_ID:
        required: true
      BOOTSTRAP_AWS_SECRET_ACCESS_KEY:
        required: true
      BOOTSTRAP_TF_STATE_BUCKET_NAME:
        required: true

env:
  FORCE_COLOR: 1
  TF_PLUGIN_CACHE_DIR: /home/runner/.terraform.d/plugin-cache

permissions: {}

jobs:
  run-infrastructure-bootstrap:
    name: Infrastructure bootstrap
    environment: ${{ inputs.environment }}
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b  # v6.2.1
        with:
          aws-access-key-id: ${{ secrets.BOOTSTRAP_AWS_ACCESS_KEY_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.BOOTSTRAP_AWS_SECRET_ACCESS_KEY }}

      - name: Apply infrastructure changes
        uses: ./.github/actions/apply-infrastructure-changes
        with:
          plugin-cache-dir: ${{ env.TF_PLUGIN_CACHE_DIR }}
          summary-title: Bootstrap Terraform Plan Output (${{ inputs.environment }})
          tfbackend-path: infrastructure/bootstrap/terraform.tfbackend
          tfbackend-content: |
            bucket="${{ secrets.BOOTSTRAP_TF_STATE_BUCKET_NAME }}"
            key="${{ inputs.environment }}/bootstrap/terraform.tfstate"
            region="${{ vars.AWS_REGION }}"
          tfvars-path: infrastructure/bootstrap/terraform.tfvars
          tfvars-content: |
            aws_region="${{ vars.AWS_REGION }}"
            aws_role_external_id="${{ secrets.AWS_ROLE_EXTERNAL_ID }}"
            environment="${{ inputs.environment }}"
            project_name="nest"
          working-directory: infrastructure/bootstrap
    timeout-minutes: 10
