name: Code checks

on:
  workflow_call:

env:
  FORCE_COLOR: 1

permissions: {}

jobs:
  run-dependency-audit:
    name: Dependency audit
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with:
          run_install: false
          version: 11.5.1

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      - name: Install build dependencies
        run: python -m pip install -r backend/requirements.build.txt

      - name: Audit dependencies
        run: make audit-dependencies
    timeout-minutes: 5

  run-frontend-checks:
    name: Frontend
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install frontend dependencies
        uses: ./.github/actions/install-frontend-dependencies

      - name: Run pnpm format
        run: pnpm run format
        working-directory: frontend

      - name: Run pnpm lint check
        run: pnpm run lint:check
        working-directory: frontend

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code || (echo 'Unstaged changes detected. \
          Run `make check` and use `git add` to address it.' && exit 1)

  run-pre-commit-checks:
    name: Pre-commit
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'

      - name: Install Poetry
        uses: ./.github/actions/install-poetry

      - name: Set up pre-commit cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          path: ~/.cache/pre-commit
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Install Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: 1.14

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93  # v6.2.2
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tflint_config_path: infrastructure/.tflint.hcl
          tflint_version: v0.60.0

      - name: Run pre-commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code || (echo 'Unstaged changes detected. \
          Run `make check` and use `git add` to address it.' && exit 1)

  run-security-checks:
    name: Security
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Semgrep security scan
        run: make security-scan-code-semgrep

      - name: Run trivy scan
        uses: ./.github/actions/run-trivy-scan
        with:
          command: make security-scan-code-trivy SCANNERS=misconfig,secret,vuln
    timeout-minutes: 15

  run-spelling-checks:
    name: Spelling checks
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with:
          run_install: false
          version: 10.33.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          cache-dependency-path: cspell/pnpm-lock.yaml
          cache: pnpm
          node-version: 24

      - name: Install cspell dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
        working-directory: cspell

      - name: Run cspell
        run: pnpm exec cspell --config cspell.json --no-progress -r ..
        working-directory: cspell
