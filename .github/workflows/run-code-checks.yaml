name: Code checks

on:
  workflow_call:

env:
  FORCE_COLOR: 1

permissions: {}

jobs:
  run-frontend-checks:
    name: Frontend
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Install frontend dependencies
        uses: ./.github/actions/install-frontend-dependencies

      - name: Run pnpm format
        run: pnpm run format
        working-directory: frontend

      - name: Run pnpm lint check
        run: pnpm run lint:check
        working-directory: frontend

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code || {
            echo "Unstaged changes detected."
            echo "Run make check and use git add to address it."
            exit 1
          }
    timeout-minutes: 5

  run-pre-commit-checks:
    name: Pre-commit
    env:
      MYPY_CACHE_DIR: /home/runner/.cache/mypy
      TF_PLUGIN_CACHE_DIR: /home/runner/.terraform.d/plugin-cache
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          cache: pip
          cache-dependency-path: backend/requirements/pre-commit.txt
          python-version: '3.13'

      - name: Cache pre-commit environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          key: pre-commit-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.pre-commit-config.yaml') }}
          path: ~/.cache/pre-commit

      - name: Cache mypy
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          key: mypy-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.pre-commit-config.yaml', 'backend/pyproject.toml', 'backend/poetry.lock') }}
          path: ${{ env.MYPY_CACHE_DIR }}
          restore-keys: |
            mypy-${{ runner.os }}-${{ runner.arch }}-

      - name: Install pre-commit
        run: python -m pip install --require-hashes --requirement backend/requirements/pre-commit.txt

      - name: Install Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: 1.14

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93  # v6.2.2
        env:
          RUNNER_OS: ${{ runner.os }}-${{ runner.arch }}
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tflint_config_path: infrastructure/.tflint.hcl
          tflint_version: v0.60.0

      - name: Cache Terraform plugins
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          key: ${{ runner.os }}-${{ runner.arch }}-terraform-${{ hashFiles('infrastructure/**/.terraform.lock.hcl') }}
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}

      - name: Ensure Terraform plugin cache directory exists
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Ensure mypy cache directory exists
        run: mkdir -p "$MYPY_CACHE_DIR"

      - name: Run pre-commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make pre-commit

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code || {
            echo "Unstaged changes detected."
            echo "Run make check and use git add to address it."
            exit 1
          }
    timeout-minutes: 5

  run-semgrep-checks:
    name: Semgrep
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Run Semgrep security scan
        run: make security-scan-code-semgrep
    timeout-minutes: 5

  run-spelling-checks:
    name: Spelling
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with:
          run_install: false
          version: 10.33.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          cache-dependency-path: cspell/pnpm-lock.yaml
          cache: pnpm
          node-version: 24

      - name: Install cspell dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
        working-directory: cspell

      - name: Run cspell
        run: pnpm exec cspell --config cspell.json --no-progress -r ..
        working-directory: cspell
    timeout-minutes: 5

  run-trivy-checks:
    name: Trivy
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Run trivy scan
        uses: ./.github/actions/run-trivy-scan
        with:
          command: make security-scan-code-trivy SCANNERS=misconfig,secret,vuln
    timeout-minutes: 5
