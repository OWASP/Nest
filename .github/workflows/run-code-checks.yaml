name: Code checks

on:
  workflow_call:

env:
  FORCE_COLOR: 1

permissions: {}

jobs:
  run-cspell-checks:
    name: CSpell
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9
        with:
          run_install: false
          version: 11.7.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          cache: pnpm
          cache-dependency-path: cspell/pnpm-lock.yaml
          node-version: 24

      - name: Install CSpell dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
        working-directory: cspell

      - name: Run CSpell
        run: make cspell
    timeout-minutes: 5

  run-eslint-checks:
    name: ESLint
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install tooling dependencies
        uses: ./.github/actions/install-tooling-dependencies

      - name: Install frontend dependencies
        uses: ./.github/actions/install-frontend-dependencies

      - name: Run ESLint check
        run: make eslint
    timeout-minutes: 5

  run-pre-commit-checks:
    name: Pre-commit
    env:
      MYPY_CACHE_DIR: /home/runner/.cache/mypy
      TF_PLUGIN_CACHE_DIR: /home/runner/.terraform.d/plugin-cache
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          cache: pip
          cache-dependency-path: backend/requirements/pre-commit.txt
          python-version: '3.13'

      - name: Cache pre-commit environments
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          key: pre-commit-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.pre-commit-config.yaml') }}
          path: ~/.cache/pre-commit

      - name: Cache mypy
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          key: mypy-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.pre-commit-config.yaml', 'backend/pyproject.toml', 'backend/poetry.lock') }}
          path: ${{ env.MYPY_CACHE_DIR }}
          restore-keys: |
            mypy-${{ runner.os }}-${{ runner.arch }}-

      - name: Install pre-commit
        run: python -m pip install --require-hashes --requirement backend/requirements/pre-commit.txt

      - name: Setup Terraform environment
        uses: ./.github/actions/setup-terraform-environment

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a  # v6.3.0
        env:
          RUNNER_OS: ${{ runner.os }}-${{ runner.arch }}
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tflint_config_path: infrastructure/.tflint.hcl
          tflint_version: v0.60.0

      - name: Ensure mypy cache directory exists
        run: mkdir -p "$MYPY_CACHE_DIR"

      - name: Run pre-commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make pre-commit
    timeout-minutes: 5

  run-prettier-checks:
    name: Prettier
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install tooling dependencies
        uses: ./.github/actions/install-tooling-dependencies

      - name: Install frontend dependencies
        uses: ./.github/actions/install-frontend-dependencies

      - name: Run Prettier check
        run: make prettier
    timeout-minutes: 5

  run-semgrep-checks:
    name: Semgrep
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Run Semgrep security scan
        run: make security-sast-scan-semgrep
    timeout-minutes: 5

  run-trivy-checks:
    name: Trivy
    permissions:
      contents: read
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Run trivy scan
        uses: ./.github/actions/run-trivy-scan
        with:
          command: make security-filesystem-scan-trivy FS_SCANNERS=misconfig,secret,vuln
    timeout-minutes: 5
