name: Upload SBOMs
description: Upload SBOMs to release or artifact based on environment

inputs:
  backend_image:
    description: Backend image to generate SBOM for
    required: true
  environment:
    description: The environment to target (staging or production)
    required: true
  frontend_image:
    description: Frontend image to generate SBOM for
    required: true
  release_tag:
    description: Release tag for uploading SBOMs
    required: false
    default: ''
  release_version:
    description: The release version used in SBOM filenames
    required: true

runs:
  using: composite
  steps:
    - name: Generate SBOM for backend image
      env:
        BACKEND_IMAGE: ${{ inputs.backend_image }}
      run: |
        make sbom-backend-image BACKEND_IMAGE_NAME="$BACKEND_IMAGE"
      shell: bash

    - name: Generate SBOM for frontend image
      env:
        FRONTEND_IMAGE: ${{ inputs.frontend_image }}
      run: |
        make sbom-frontend-image FRONTEND_IMAGE_NAME="$FRONTEND_IMAGE"
      shell: bash

    - name: Upload SBOMs to release
      if: ${{ inputs.environment == 'production' }}
      env:
        RELEASE_VERSION: ${{ inputs.release_version }}
        RELEASE_TAG: ${{ inputs.release_tag }}
      run: |
        gh release upload "$RELEASE_TAG" \
          "backend-sbom-$RELEASE_VERSION.cdx.json" \
          "frontend-sbom-$RELEASE_VERSION.cdx.json"
      shell: bash

    - name: Upload SBOMs as artifact
      if: ${{ inputs.environment == 'staging' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: staging-sbom-${{ inputs.release_version }}
        path: |
          backend-sbom-${{ inputs.release_version }}.cdx.json
          frontend-sbom-${{ inputs.release_version }}.cdx.json
