name: Setup Terraform Environment
description: >
  Installs Terraform and configures the provider cache.
  The CLI version is taken from the hashicorp/terraform image tag in
  docker/terraform/Dockerfile unless terraform_version is set.
  NOTE: The calling job must check out the repository before using this
  action - local composite actions can only be resolved by the runner
  after checkout, so an internal checkout here would be unreachable.
  NOTE: The calling job must also set the TF_PLUGIN_CACHE_DIR env var
  at the workflow or job level; this action reads it implicitly for
  both the cache directory creation and the plugin cache step.

inputs:
  dockerfile:
    default: docker/terraform/Dockerfile
    description: Dockerfile whose hashicorp/terraform image tag pins the CLI version
    required: false
  terraform_version:
    default: ''
    description: Optional Terraform version override (defaults to the Dockerfile image tag)
    required: false

runs:
  steps:
    - name: Resolve Terraform version
      id: resolve-terraform-version
      env:
        DOCKERFILE: ${{ inputs.dockerfile }}
        TERRAFORM_VERSION_OVERRIDE: ${{ inputs.terraform_version }}
      run: |
        set -euo pipefail
        if [[ -n "${TERRAFORM_VERSION_OVERRIDE}" ]]; then
          version="${TERRAFORM_VERSION_OVERRIDE}"
        else
          version="$(
            sed -nE 's/^FROM[[:space:]]+hashicorp\/terraform:([^[:space:]@]+).*/\1/p' \
              "${DOCKERFILE}" | head -n 1
          )"
          if [[ -z "${version}" ]]; then
            echo "Error: could not parse hashicorp/terraform tag from ${DOCKERFILE}" >&2
            exit 1
          fi
        fi
        echo "Using Terraform version ${version}"
        echo "version=${version}" >> "${GITHUB_OUTPUT}"
      shell: bash

    - name: Install Terraform
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
      with:
        terraform_version: ${{ steps.resolve-terraform-version.outputs.version }}

    - name: Create plugin cache directory
      env:
        TF_PLUGIN_CACHE_DIR: ${{ env.TF_PLUGIN_CACHE_DIR }}
      run: mkdir -p "$TF_PLUGIN_CACHE_DIR"
      shell: bash

    - name: Cache Terraform plugins
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        key: ${{ runner.os }}-${{ runner.arch }}-terraform-${{ hashFiles('infrastructure/**/.terraform.lock.hcl') }}
        path: ${{ env.TF_PLUGIN_CACHE_DIR }}
  using: composite
