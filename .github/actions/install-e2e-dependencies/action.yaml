name: Install e2e dependencies

description: >-
  Installs pnpm and Node, and installs e2e dependencies.

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      with:
        version: 11.7.0

    - name: Cache e2e node_modules
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        key: e2e-node-modules-${{ runner.os }}-${{ runner.arch }}-node-24-${{ hashFiles('e2e/pnpm-lock.yaml') }}
        path: e2e/node_modules
        restore-keys: |
          e2e-node-modules-${{ runner.os }}-${{ runner.arch }}-node-24-

    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        cache: pnpm
        cache-dependency-path: e2e/pnpm-lock.yaml
        node-version: 24

    - name: Install e2e dependencies
      run: pnpm install --frozen-lockfile --prefer-offline
      shell: bash
      working-directory: e2e
