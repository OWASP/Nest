version: 2
updates:
  - package-ecosystem: docker
    cooldown:
      default-days: 21
    directories:
      - docker/*
    ignore:
      - dependency-name: node
        update-types:
          - version-update:semver-major
      - dependency-name: python
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
    groups:
      version-updates:
        applies-to: version-updates
        patterns:
          - '*'
    schedule:
      interval: daily
    target-branch: main

  - package-ecosystem: docker-compose
    cooldown:
      default-days: 21
    directories:
      - docker-compose/*
    groups:
      version-updates:
        applies-to: version-updates
        patterns:
          - '*'
    schedule:
      interval: daily
    target-branch: main

  - package-ecosystem: github-actions
    cooldown:
      default-days: 21
    directories:
      - /
    groups:
      version-updates:
        applies-to: version-updates
        patterns:
          - '*'
    schedule:
      interval: daily
    target-branch: main

  - package-ecosystem: npm
    cooldown:
      default-days: 21
    directories:
      - cspell
      - e2e
      - frontend
    groups:
      version-updates:
        applies-to: version-updates
        group-by: dependency-name
        patterns:
          - '*'
    schedule:
      interval: daily
    target-branch: main

  - package-ecosystem: pip
    cooldown:
      default-days: 21
    directories:
      - backend
      - docs
    groups:
      version-updates:
        applies-to: version-updates
        group-by: dependency-name
        patterns:
          - '*'
    schedule:
      interval: daily
    target-branch: main

  - package-ecosystem: pre-commit
    cooldown:
      default-days: 21
    directories:
      - /
    groups:
      version-updates:
        applies-to: version-updates
        group-by: dependency-name
        patterns:
          - '*'
    schedule:
      interval: daily
    target-branch: main

  - package-ecosystem: terraform
    cooldown:
      default-days: 21
    directories:
      - infrastructure/bootstrap
      - infrastructure/live
      - infrastructure/modules/alb
      - infrastructure/modules/cache
      - infrastructure/modules/database
      - infrastructure/modules/ecr-cache
      - infrastructure/modules/kms
      - infrastructure/modules/networking
      - infrastructure/modules/networking/modules/nacl
      - infrastructure/modules/networking/modules/vpc-endpoint
      - infrastructure/modules/parameters
      - infrastructure/modules/security
      - infrastructure/modules/service
      - infrastructure/modules/storage
      - infrastructure/modules/storage/modules/s3-bucket
      - infrastructure/modules/storage/modules/shared-data-bucket
      - infrastructure/modules/tasks
      - infrastructure/modules/tasks/modules/task
      - infrastructure/state
    groups:
      version-updates:
        applies-to: version-updates
        group-by: dependency-name
        patterns:
          - '*'
    schedule:
      interval: daily
    target-branch: main
