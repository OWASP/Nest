version: 2
updates:
  - package-ecosystem: docker
    cooldown:
      default-days: 21
    directories:
      - docker/*
    ignore:
      - dependency-name: node
        update-types:
          - version-update:semver-major
      - dependency-name: python
        update-types:
          - version-update:semver-major
    groups:
      version-updates:
        applies-to: version-updates
        patterns:
          - '*'
    schedule:
      interval: daily
    target-branch: main

  - package-ecosystem: docker-compose
    cooldown:
      default-days: 21
    directories:
      - docker-compose/*
    groups:
      version-updates:
        applies-to: version-updates
        patterns:
          - '*'
    schedule:
      interval: daily
    target-branch: main

  - package-ecosystem: github-actions
    cooldown:
      default-days: 21
    directories:
      - /
    groups:
      version-updates:
        applies-to: version-updates
        patterns:
          - '*'
    schedule:
      interval: daily
    target-branch: main

  - package-ecosystem: npm
    cooldown:
      default-days: 21
    directories:
      - cspell
      - e2e
      - frontend
    groups:
      version-updates:
        applies-to: version-updates
        group-by: dependency-name
        patterns:
          - '*'
    schedule:
      interval: daily
    target-branch: main

  - package-ecosystem: pip
    cooldown:
      default-days: 21
    directories:
      - backend
      - docs
    groups:
      version-updates:
        applies-to: version-updates
        group-by: dependency-name
        patterns:
          - '*'
    schedule:
      interval: daily
    target-branch: main

  - package-ecosystem: pre-commit
    cooldown:
      default-days: 21
    directories:
      - /
    groups:
      version-updates:
        applies-to: version-updates
        group-by: dependency-name
        patterns:
          - '*'
    schedule:
      interval: daily
    target-branch: main
