{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link type="text/css"
              rel="stylesheet"
              href="{% static 'ninja/swagger-ui.css' %}">
        <link type="text/css"
              rel="stylesheet"
              href="{% static 'css/swagger-custom-ui.css' %}">
        {% include "ninja/favicons.html" %}
        <title>{{ api.title }}</title>
        <script>
            (() => {
                const root = document.documentElement;

                const getCookie = (name) =>
                    document.cookie
                    .split("; ")
                    .find((row) => row.startsWith(name + "="))
                    ?.split("=")[1];

                const getTheme = () => localStorage.getItem("theme") || getCookie("theme") ||
                    (globalThis.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

                const apply = (theme) => {
                    root.classList.toggle("dark", theme === "dark");
                };

                apply(getTheme());

                document.addEventListener("click", (e) => {
                    if (!e.target.closest(".toggle-theme-btn")) return;

                    const newTheme = root.classList.contains("dark") ? "light" : "dark";
                    localStorage.setItem("theme", newTheme)
                    apply(newTheme);
                });
            })();
        </script>
    </head>
    <body data-csrf-token="{% if add_csrf %}{{ csrf_token }}{% endif %}"
          data-api-csrf="{% if add_csrf %}true{% endif %}">
        <script type="application/json" id="swagger-settings">
            {{ swagger_settings | safe }}
        </script>
        <div class="nest-topbar">
            <div class="logo">
                <div class="logo-img-div">
                    <img src="{% static 'img/logo.png' %}" class="nest-logo" alt="Nest logo" />
                </div>
                <div class="logo-text">Nest</div>
            </div>
            <button type="button" class="toggle-theme-btn" aria-label="Toggle theme">
                <img src="{% static 'img/light_mode.svg' %}"
                     data-light-src="{% static 'img/light_mode.svg' %}"
                     data-dark-src="{% static 'img/dark_mode.svg' %}"
                     class="theme-icon"
                     alt=""
                     aria-hidden="true" />
            </button>
        </div>
        <div id="swagger-ui"></div>
        <script src="{% static 'ninja/swagger-ui-bundle.js' %}"></script>
        <script src="{% static 'ninja/swagger-ui-init.js' %}"></script>
    </body>
</html>
