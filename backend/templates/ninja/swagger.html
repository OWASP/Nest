{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link type="text/css"
              rel="stylesheet"
              href="{% static 'ninja/swagger-ui.css' %}">
        <link type="text/css"
              rel="stylesheet"
              href="{% static 'css/swagger-custom-ui.css' %}">
        {% include "ninja/favicons.html" %}
        <title>{{ api.title }}</title>
        <script>
            (() => {
                const root = document.documentElement;
                const getToggleLabel = (theme) => theme === "dark" ? "Switch to light mode" : "Switch to dark mode";

                const syncToggleThemeText = (theme) => {
                    const toggleButton = document.querySelector(".toggle-theme-btn");
                    if (!toggleButton) return;

                    const label = getToggleLabel(theme);
                    toggleButton.setAttribute("aria-label", label);
                    toggleButton.setAttribute("title", label);
                };

                const getCookie = (name) =>
                    document.cookie
                    .split("; ")
                    .find((row) => row.startsWith(name + "="))
                    ?.split("=")[1];

                const getTheme = () => localStorage.getItem("theme") || getCookie("theme") ||
                    (globalThis.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

                const apply = (theme) => {
                    root.classList.toggle("dark", theme === "dark");
                    syncToggleThemeText(theme);
                };

                apply(getTheme());

                document.addEventListener("DOMContentLoaded", () => {
                    const activeTheme = root.classList.contains("dark") ? "dark" : "light";
                    syncToggleThemeText(activeTheme);
                });

                document.addEventListener("click", (e) => {
                    if (!e.target.closest(".toggle-theme-btn")) return;

                    const newTheme = root.classList.contains("dark") ? "light" : "dark";
                    localStorage.setItem("theme", newTheme)
                    apply(newTheme);
                });
            })();
        </script>
    </head>
    <body data-csrf-token="{% if add_csrf %}{{ csrf_token }}{% endif %}"
          data-api-csrf="{% if add_csrf %}true{% endif %}">
        {# djlint:off #}
        <!-- NOSEMGREP: python.flask.security.xss.audit.template-unescaped-with-safe.template-unescaped-with-safe -->
        <script type="application/json" id="swagger-settings">{{ swagger_settings | safe }}</script><!-- NOSEMGREP: generic.html-templates.security.var-in-script-tag.var-in-script-tag -->
        {# djlint:on #}
        <div class="nest-top-bar">
            <a href="/" class="logo nest-logo-link" aria-label="Nest home">
                <div class="logo-img-div">
                    <img src="{% static 'img/logo.png' %}" class="nest-logo" alt="" />
                </div>
                <div class="logo-text">Nest</div>
            </a>
            <button type="button"
                    class="toggle-theme-btn"
                    aria-label="Switch to dark mode"
                    title="Switch to dark mode">
                <svg class="theme-icon theme-icon-sun"
                     aria-hidden="true"
                     width="24"
                     height="24"
                     viewBox="0 -960 960 960"
                     fill="currentColor">
                    <path d="M565-395q35-35 35-85t-35-85q-35-35-85-35t-85 35q-35 35-35 85t35 85q35 35 85 35t85-35Zm-226.5 56.5Q280-397 280-480t58.5-141.5Q397-680 480-680t141.5 58.5Q680-563 680-480t-58.5 141.5Q563-280 480-280t-141.5-58.5ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Zm326-268Z" />
                </svg>
                <svg class="theme-icon theme-icon-moon"
                     aria-hidden="true"
                     width="24"
                     height="24"
                     viewBox="0 -960 960 960"
                     fill="currentColor">
                    <path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Zm0-80q88 0 158-48.5T740-375q-20 5-40 8t-40 3q-123 0-209.5-86.5T364-660q0-20 3-40t8-40q-78 32-126.5 102T200-480q0 116 82 198t198 82Zm-10-270Z" />
                </svg>
            </button>
        </div>
        <div id="swagger-ui"></div>
        <script src="{% static 'ninja/swagger-ui-bundle.js' %}"></script>
        <script src="{% static 'ninja/swagger-ui-init.js' %}"></script>
    </body>
</html>
