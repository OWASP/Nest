cache-dir = ".cache/pypoetry"

[solver]
# 21 days.
min-release-age = 21
min-release-age-exclude = [
    "django",              # 6.0.6
    "idna",                # 3.15
    "langchain-core",      # 1.3.3
    "langsmith",           # 0.8.0
    "pyjwt",               # 2.13.0
    "starlette",           # 1.0.1
    "strawberry-graphql",  # 0.315.4
    "urllib3",             # 2.7.0
]

[virtualenvs]
create = true
in-project = true
use-poetry-python = true
