allowBuilds:
  '@heroui/shared-utils': true
  '@sentry/cli': true
  '@swc/core': true
  core-js: true
  protobufjs: true
  sharp: true
  # "unrs" (from "unrs-resolver", a native build dependency allow-listed above
  # for pnpm v11) is not a dictionary word; accept it here instead of adding it
  # to the shared cSpell dictionary.
  # cspell:ignore unrs
  unrs-resolver: true
# The Docker image already installs dependencies with --frozen-lockfile, so the
# dev container's `pnpm run dev` must not re-verify/reinstall them on startup.
# Without this, pnpm v11 tries to purge the (root-owned) node_modules volume and
# fails (no TTY for the confirmation prompt / EACCES as the non-root user).
verifyDepsBeforeRun: false
# 21 days (in minutes)
minimumReleaseAge: 30240
minimumReleaseAgeExclude:
  - '@next/env@16.2.6'
  - '@next/swc-darwin-arm64@16.2.6'
  - '@next/swc-darwin-x64@16.2.6'
  - '@next/swc-linux-arm64-gnu@16.2.6'
  - '@next/swc-linux-arm64-musl@16.2.6'
  - '@next/swc-linux-x64-gnu@16.2.6'
  - '@next/swc-linux-x64-musl@16.2.6'
  - '@next/swc-win32-arm64-msvc@16.2.6'
  - '@next/swc-win32-x64-msvc@16.2.6'
  - brace-expansion@5.0.6
  - fast-uri@3.1.2
  - next@16.2.6
  - postcss@8.5.10
  - protobufjs@7.5.8
  - ws@8.20.1

overrides:
  brace-expansion@5: 5.0.6
  fast-uri: 3.1.2
  glob: ^11.1.0
  postcss: 8.5.10
  protobufjs: 7.5.8
  serialize-javascript: ^7.0.3
  test-exclude: ^7.0.1
  ws@8: 8.20.1

publicHoistPattern:
  - '*import-in-the-middle*'

saveExact: true
