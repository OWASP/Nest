# https://terraform-docs.io/user-guide/configuration/
formatter: markdown table

output:
  file: README.md
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

output-values:
  enabled: false
  from: ''

recursive:
  enabled: true
  exclude:
    - .terraform
    - .terragrunt-cache
    - tests
  include-main: false
  path: .

sections:
  hide: []
  show: []

settings:
  anchor: true
  color: true
  default: true
  description: true
  escape: true
  hide-empty: false
  html: true
  indent: 2
  lockfile: true
  read-comments: true
  required: true
  sensitive: true
  type: true

sort:
  enabled: true
  by: name
